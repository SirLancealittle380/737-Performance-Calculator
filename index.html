<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="mobile-web-app-capable" content="yes">
  <title>737 Fuel &amp; Alternate Policy</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#CC0000">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    :root {
      --red: #CC0000;
      --green: #166534;
      --green-bg: #dcfce7;
      --amber: #92400e;
      --amber-bg: #fef3c7;
      --blue: #1e40af;
      --blue-bg: #dbeafe;
      --red-bg: #fee2e2;
      --bg: #f1f5f9;
      --card: #ffffff;
      --border: #e2e8f0;
      --text: #0f172a;
      --text-muted: #64748b;
      --nav-h: 62px;
      --header-h: 58px;
    }

    html, body { height: 100%; overflow: hidden; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; background: var(--bg); color: var(--text); }
    #app { display: flex; flex-direction: column; height: 100vh; }

    /* HEADER */
    .header { background: var(--red); color: white; height: var(--header-h); display: flex; align-items: center; padding: 0 16px; gap: 12px; flex-shrink: 0; box-shadow: 0 2px 8px rgba(0,0,0,0.25); }
    .header-logo { width: 38px; height: 38px; border-radius: 50%; background: white; display: flex; align-items: center; justify-content: center; font-size: 20px; font-weight: 900; color: var(--red); flex-shrink: 0; font-family: Georgia, serif; }
    .header-title { font-size: 17px; font-weight: 700; line-height: 1.2; }
    .header-sub { font-size: 11px; opacity: 0.8; margin-top: 2px; }

    /* SCROLL AREA */
    .scroll-area { flex: 1; overflow-y: auto; padding: 14px 14px calc(var(--nav-h) + 14px); -webkit-overflow-scrolling: touch; }
    .scroll-area::-webkit-scrollbar { display: none; }

    /* BOTTOM NAV — 5 tabs */
    .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; height: var(--nav-h); background: white; border-top: 1px solid var(--border); display: flex; z-index: 100; box-shadow: 0 -2px 8px rgba(0,0,0,0.06); }
    .nav-btn { flex: 1; background: none; border: none; cursor: pointer; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 2px; font-size: 9.5px; font-weight: 600; color: var(--text-muted); padding: 4px 2px; transition: color 0.15s; }
    .nav-btn.active { color: var(--red); }
    .nav-btn .nav-icon { font-size: 20px; line-height: 1; }

    /* CARDS */
    .card { background: var(--card); border-radius: 14px; padding: 16px; margin-bottom: 12px; box-shadow: 0 1px 4px rgba(0,0,0,0.08); }
    .card-label { font-size: 11px; font-weight: 700; letter-spacing: 0.8px; color: var(--red); text-transform: uppercase; margin-bottom: 12px; }

    /* WIZARD */
    .phase-badge { display: inline-flex; align-items: center; gap: 5px; background: #fff1f2; color: var(--red); border-radius: 20px; padding: 3px 10px; font-size: 11px; font-weight: 700; letter-spacing: 0.3px; margin-bottom: 14px; }
    .wiz-question { font-size: 16px; font-weight: 700; line-height: 1.4; margin-bottom: 6px; }
    .wiz-hint { font-size: 13px; color: var(--text-muted); line-height: 1.5; margin-bottom: 16px; }
    .wiz-options { display: flex; flex-direction: column; gap: 9px; }
    .opt-btn { padding: 13px 14px; border: 2px solid var(--border); border-radius: 12px; background: white; cursor: pointer; text-align: left; transition: border-color 0.15s, background 0.15s; }
    .opt-btn:active { background: #f8fafc; }
    .opt-btn.chosen { border-color: var(--red); background: #fff5f5; }
    .opt-main { font-size: 14px; font-weight: 600; margin-bottom: 3px; }
    .opt-desc { font-size: 12px; color: var(--text-muted); line-height: 1.4; }

    /* RESULTS */
    .result-box { border-radius: 12px; padding: 15px; margin-bottom: 12px; border-left: 5px solid; }
    .result-box.green { background: var(--green-bg); border-color: var(--green); }
    .result-box.amber { background: var(--amber-bg); border-color: #d97706; }
    .result-box.red   { background: var(--red-bg);   border-color: #dc2626; }
    .result-box.blue  { background: var(--blue-bg);  border-color: var(--blue); }
    .result-action { font-size: 26px; font-weight: 900; letter-spacing: -0.5px; margin-bottom: 4px; }
    .result-title { font-size: 15px; font-weight: 700; margin-bottom: 6px; }
    .result-body  { font-size: 13px; line-height: 1.6; color: #374151; }

    /* REQUIREMENT LIST */
    .req-list { margin-top: 14px; }
    .req-list-title { font-size: 13px; font-weight: 700; color: var(--text-muted); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.4px; }
    .req-item { display: flex; gap: 10px; padding: 9px 0; border-bottom: 1px solid #f1f5f9; font-size: 13px; line-height: 1.5; }
    .req-item:last-child { border-bottom: none; }
    .req-icon { flex-shrink: 0; font-size: 16px; margin-top: 1px; }

    /* INFO BOX */
    .info-box { background: #f0f9ff; border: 1px solid #bae6fd; border-radius: 10px; padding: 11px 13px; font-size: 12px; color: #075985; line-height: 1.5; margin-top: 12px; }
    .warn-box  { background: #fffbeb; border: 1px solid #fcd34d; border-radius: 10px; padding: 11px 13px; font-size: 12px; color: #92400e; line-height: 1.5; margin-top: 12px; }

    /* BUTTONS */
    .btn { padding: 13px 20px; border-radius: 12px; border: none; cursor: pointer; font-size: 14px; font-weight: 600; width: 100%; margin-top: 10px; transition: opacity 0.15s; }
    .btn:active { opacity: 0.75; }
    .btn-primary { background: var(--red); color: white; }
    .btn-ghost { background: #f1f5f9; color: var(--text); }

    /* FORM FIELDS */
    .field-group { margin-bottom: 14px; }
    .field-label { font-size: 11px; font-weight: 700; letter-spacing: 0.6px; color: var(--text-muted); text-transform: uppercase; margin-bottom: 7px; display: block; }
    .field-row { display: flex; align-items: center; gap: 8px; }
    .field-input { flex: 1; padding: 12px 14px; border: 2px solid var(--border); border-radius: 10px; font-size: 16px; background: white; color: var(--text); outline: none; transition: border-color 0.15s; -webkit-appearance: none; }
    .field-input:focus { border-color: var(--red); }
    .field-unit { font-size: 13px; color: var(--text-muted); white-space: nowrap; }
    .field-hint { font-size: 11px; color: #94a3b8; margin-top: 5px; }
    .field-input.time-input { max-width: 110px; flex: none; }

    /* TOGGLE BUTTONS */
    .toggle-row { display: flex; gap: 7px; flex-wrap: wrap; }
    .tog-btn { padding: 9px 14px; border: 2px solid var(--border); border-radius: 9px; background: white; cursor: pointer; font-size: 13px; font-weight: 600; color: var(--text-muted); transition: border-color 0.15s, background 0.15s, color 0.15s; }
    .tog-btn.on { border-color: var(--red); background: #fff5f5; color: var(--red); }

    /* FUEL BREAKDOWN */
    .fuel-row { display: flex; justify-content: space-between; align-items: flex-start; padding: 10px 0; border-bottom: 1px solid #f1f5f9; }
    .fuel-row:last-child { border-bottom: none; border-top: 2px solid #e2e8f0; margin-top: 6px; padding-top: 14px; }
    .fuel-name { font-size: 14px; flex: 1; }
    .fuel-note { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
    .fuel-amt { font-size: 14px; font-weight: 700; color: var(--red); text-align: right; white-space: nowrap; }
    .fuel-amt.nil { color: #94a3b8; font-weight: 500; }
    .fuel-row:last-child .fuel-name { font-weight: 700; font-size: 15px; }
    .fuel-row:last-child .fuel-amt { font-size: 18px; }

    /* AIRPORT SELECTOR */
    .airport-scroll { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 6px; margin-bottom: 4px; -webkit-overflow-scrolling: touch; scrollbar-width: none; }
    .airport-scroll::-webkit-scrollbar { display: none; }
    .airport-chip { flex-shrink: 0; padding: 7px 12px; border: 2px solid var(--border); border-radius: 20px; background: white; cursor: pointer; font-size: 12px; font-weight: 700; color: var(--text-muted); transition: all 0.15s; white-space: nowrap; }
    .airport-chip.on { border-color: var(--red); background: #fff5f5; color: var(--red); }
    .airport-group-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.6px; color: var(--text-muted); margin: 10px 0 6px; }
    .airport-info-box { background: #f8fafc; border: 1px solid var(--border); border-radius: 10px; padding: 11px 13px; margin-top: 10px; font-size: 13px; line-height: 1.55; }
    .airport-info-box .ai-name { font-weight: 700; margin-bottom: 4px; }
    .airport-info-box .ai-type { font-size: 12px; }

    /* REFERENCE ACCORDION */
    .acc-btn { width: 100%; padding: 15px 16px; background: none; border: none; cursor: pointer; display: flex; justify-content: space-between; align-items: center; font-size: 14px; font-weight: 600; color: var(--text); text-align: left; }
    .acc-chevron { font-size: 18px; color: var(--text-muted); flex-shrink: 0; transition: transform 0.2s; }
    .acc-chevron.open { transform: rotate(180deg); }
    .acc-body { padding: 0 16px 15px; border-top: 1px solid var(--border); }

    /* REFERENCE ITEMS */
    .ref-item { margin-bottom: 13px; }
    .ref-term { font-size: 13px; font-weight: 700; margin-bottom: 3px; display: flex; align-items: center; gap: 7px; flex-wrap: wrap; }
    .ref-badge { display: inline-block; background: var(--red); color: white; font-size: 11px; font-weight: 700; padding: 1px 7px; border-radius: 4px; }
    .ref-def { font-size: 12px; color: var(--text-muted); line-height: 1.55; }

    /* TABLES */
    .mini-table { width: 100%; border-collapse: collapse; font-size: 12px; margin-top: 6px; }
    .mini-table th { padding: 7px 9px; background: #f8fafc; border: 1px solid var(--border); font-size: 11px; font-weight: 700; color: var(--text-muted); text-align: left; }
    .mini-table td { padding: 8px 9px; border: 1px solid var(--border); vertical-align: top; line-height: 1.45; }
    .td-dm  { background: #dbeafe; font-weight: 700; }
    .td-rdm { background: #dcfce7; font-weight: 700; }
    .td-qm  { background: #fef9c3; font-weight: 700; }
    .td-lm  { background: #f8fafc; font-weight: 700; }

    /* RDM RESULT */
    .rdm-result { background: #f0fdf4; border: 2px solid #86efac; border-radius: 12px; padding: 16px; margin-top: 12px; text-align: center; }
    .rdm-value { font-size: 28px; font-weight: 900; color: #15803d; letter-spacing: -0.5px; }
    .rdm-label { font-size: 12px; color: var(--text-muted); margin-top: 4px; }
    .rdm-na { background: var(--red-bg); border: 2px solid #fca5a5; }
    .rdm-na .rdm-value { color: #dc2626; font-size: 22px; }

    /* PROB RESULT */
    .prob-result { border-radius: 12px; padding: 16px; margin-top: 12px; }
    .prob-not-apply { background: var(--green-bg); border: 2px solid #86efac; }
    .prob-apply { background: var(--red-bg); border: 2px solid #fca5a5; }
    .prob-title { font-size: 16px; font-weight: 800; margin-bottom: 6px; }
    .prob-detail { font-size: 13px; line-height: 1.55; color: #374151; }

    /* FLOWCHARTS */
    .fc { font-size:12px; line-height:1.5; }
    .fc-start { background:var(--red); color:white; border-radius:20px; padding:5px 14px; font-size:11px; font-weight:700; text-align:center; margin:0 auto 6px; display:table; letter-spacing:0.5px; }
    .fc-q { background:var(--card); border:2px solid #94a3b8; border-radius:8px; padding:8px 11px; font-weight:700; font-size:12px; text-align:center; margin:4px 0; position:relative; }
    .fc-q::before { content:'◆'; color:#94a3b8; font-size:9px; display:block; margin-bottom:2px; }
    .fc-arrow { text-align:center; color:#94a3b8; font-size:13px; line-height:1; margin:1px 0; }
    .fc-split { display:flex; gap:7px; margin:4px 0; }
    .fc-col { flex:1; display:flex; flex-direction:column; min-width:0; }
    .fc-tag { font-size:10px; font-weight:800; padding:2px 7px; border-radius:4px; margin:2px 0; text-align:center; align-self:center; letter-spacing:0.3px; }
    .fc-tag.y  { background:#dcfce7; color:#166534; }
    .fc-tag.n  { background:#fee2e2; color:#dc2626; }
    .fc-tag.bm { background:#fef3c7; color:#92400e; }
    .fc-tag.lm { background:#fecaca; color:#991b1b; }
    .fc-box { border-radius:8px; padding:8px 10px; font-size:11px; line-height:1.5; flex:1; }
    .fc-box.g  { background:#dcfce7; border:1px solid #86efac; }
    .fc-box.a  { background:#fef3c7; border:1px solid #fcd34d; }
    .fc-box.r  { background:#fee2e2; border:1px solid #fca5a5; }
    .fc-box.b  { background:#dbeafe; border:1px solid #93c5fd; }
    .fc-box.p  { background:#f3e8ff; border:1px solid #d8b4fe; }
    .fc-box-title { font-weight:800; font-size:12px; margin-bottom:3px; }
    .fc-or { text-align:center; font-weight:800; font-size:10px; color:var(--text-muted); margin:2px 0; }
    .fc-line { border-left:2px solid var(--border); padding-left:8px; margin-left:4px; }
    .fc-note { font-size:10px; color:var(--text-muted); font-style:italic; margin-top:4px; }
    /* Matrix table */
    .mx-table { width:100%; border-collapse:collapse; font-size:10px; margin-top:8px; }
    .mx-table th { background:var(--red); color:white; padding:5px 4px; text-align:center; font-size:9px; font-weight:700; border:1px solid #fff; vertical-align:top; line-height:1.3; }
    .mx-table td { padding:4px; border:1px solid var(--border); vertical-align:top; text-align:center; font-size:10px; line-height:1.3; }
    .mx-ph { background:#334155; color:white; font-weight:700; font-size:9px; }
    .mx-req { background:#dcfce7; }
    .mx-opt { background:#fef3c7; }
    .mx-na  { background:#f8fafc; color:#94a3b8; }
    @media (prefers-color-scheme: dark) {
      .fc-q { background:var(--card); border-color:#475569; }
      .fc-box.g { background:#052e16; border-color:#166534; }
      .fc-box.a { background:#451a03; border-color:#92400e; color:#fcd34d; }
      .fc-box.r { background:#3b0606; border-color:#dc2626; }
      .fc-box.b { background:#0c2a3d; border-color:#1e40af; color:#93c5fd; }
      .fc-box.p { background:#2e1065; border-color:#7e22ce; color:#d8b4fe; }
      .mx-na  { background:#1e293b; }
      .mx-req { background:#052e16; }
      .mx-opt { background:#451a03; }
    }

    /* ANIMATION */
    @keyframes fadeUp { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
    .fade-up { animation: fadeUp 0.2s ease-out; }

    /* DISCLAIMER */
    .disclaimer { border-radius: 10px; padding: 10px 13px; margin-bottom: 10px; background: #fff7ed; border: 1px solid #fed7aa; font-size: 12px; color: #9a3412; line-height: 1.5; }

    /* DARK MODE */
    @media (prefers-color-scheme: dark) {
      :root { --bg: #0f172a; --card: #1e293b; --border: #334155; --text: #f1f5f9; --text-muted: #94a3b8; }
      .opt-btn { background: var(--card); }
      .opt-btn.chosen { background: #3b0606; }
      .bottom-nav { background: #1e293b; }
      .tog-btn { background: var(--card); }
      .tog-btn.on { background: #3b0606; }
      .field-input { background: var(--card); color: var(--text); }
      .btn-ghost { background: #334155; }
      .mini-table th { background: #334155; }
      .mini-table td { background: var(--card); }
      .acc-btn { color: var(--text); }
      .phase-badge { background: #3b0606; }
      .airport-chip { background: var(--card); }
      .airport-chip.on { background: #3b0606; }
      .airport-info-box { background: #0f172a; }
      .rdm-result { background: #052e16; border-color: #166534; }
      .disclaimer { background: #431407; border-color: #7c2d12; color: #fed7aa; }
      .info-box { background: #0c2a3d; border-color: #164e63; color: #7dd3fc; }
      .warn-box { background: #451a03; border-color: #92400e; color: #fcd34d; }
    }
  </style>
</head>

function switchTab(tab) {
  S.tab = tab;
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.toggle('active', b.dataset.tab === tab));
  render();
}

function render() {

function fmt(n) { return Math.round(n).toLocaleString(); }

function stepDots(total, current) {
  return Array.from({length: total}, (_, i) => {
    const w = i === current ? '22px' : '8px';
    const bg = i < current ? 'var(--green)' : i === current ? 'var(--red)' : 'var(--border)';
    return `<span style="display:inline-block;width:${w};height:8px;border-radius:4px;background:${bg};margin-right:5px;transition:all 0.2s"></span>`;
  }).join('');
}

function wizardCard(phase, q, hint, opts, fnName, key, totalSteps, currentStep) {
  const optHtml = opts.map(o =>
    `<button class="opt-btn" onclick="${fnName}('${key}','${o.v}')">
       <div class="opt-main">${o.label}</div>
       <div class="opt-desc">${o.desc}</div>
     </button>`
  ).join('');
  return `
    <div class="card">
      <div style="margin-bottom:14px">${stepDots(totalSteps, currentStep)}</div>
      <div class="phase-badge">🔍 ${phase}</div>
      <div class="wiz-question">${q}</div>
      <div class="wiz-hint">${hint}</div>
      <div class="wiz-options">${optHtml}</div>
    </div>`;
}

function fuelSet(key, val) { S.fuel[key] = val; render(); }

// Parse EOD from OFP format "hh:mm" or plain minutes
function parseEOD(val) {
  if (!val) return null;
  val = val.trim();
  if (val.includes(':')) {
    const [h, m] = val.split(':').map(Number);
    return h * 60 + (m || 0);
  }
  const n = parseFloat(val);
  return isNaN(n) ? null : n;
}

function fuelSetUnit(unit) {
  // Convert current value when switching units
  const raw = parseFloat(S.fuel.frf) || 0;
  const flow = b737HoldFlow(S.fuel.weight || 65);
  if (unit === 'min' && S.fuel.frfUnit === 'kg' && raw > 0) {
    S.fuel.frf = (raw / flow).toFixed(1);
  } else if (unit === 'kg' && S.fuel.frfUnit === 'min' && raw > 0) {
    S.fuel.frf = String(Math.round(raw * flow));
  }
  S.fuel.frfUnit = unit;
  render();
}

function fuelSaveScenario() {
  const name = prompt('Scenario name (e.g. SYD-AKL No Alt):');
  if (!name || !name.trim()) return;
  const key = name.trim();
  const snap = { frf: S.fuel.frf, frfUnit: S.fuel.frfUnit, weight: S.fuel.weight, destType: S.fuel.destType, altCarried: S.fuel.altCarried, altFuel: S.fuel.altFuel, tripFuel: S.fuel.tripFuel, contingency: S.fuel.contingency, airport: S.fuel.airport, plnUsbl: S.fuel.plnUsbl, eod: S.fuel.eod };
  S.fuel.scenarios[key] = snap;
  try { localStorage.setItem('737_scenarios', JSON.stringify(S.fuel.scenarios)); } catch(e) {}
  render();
}

function fuelLoadScenario() {
  const sel = document.getElementById('scenario-select');
  if (!sel || !sel.value) return;
  const snap = S.fuel.scenarios[sel.value];
  if (!snap) return;
  Object.assign(S.fuel, snap);
  render();
}

function fuelDeleteScenario() {
  const sel = document.getElementById('scenario-select');
  if (!sel || !sel.value) return;
  delete S.fuel.scenarios[sel.value];
  try { localStorage.setItem('737_scenarios', JSON.stringify(S.fuel.scenarios)); } catch(e) {}
  render();
}

// Load saved scenarios from localStorage on startup
try {
  const saved = localStorage.getItem('737_scenarios');
  if (saved) S.fuel.scenarios = JSON.parse(saved);
} catch(e) {}

// ══════════════════════════════════════════════════════
// B737-800 PERFORMANCE HELPERS
// ══════════════════════════════════════════════════════
// 1500ft holding fuel flow (kg/min) — linear model vs weight
function b737HoldFlow(wt_t) {
  const w = parseFloat(wt_t) || 65;
  // ~55 kg/min at 60t, ~65 kg/min at 70t (1500ft 1-engine-failed-hold basis)
  return Math.max(40, Math.round(55 + (w - 60) * 1.0));
}

// Holding fuel flow at altitude (kg/min) — increases ~0.15 kg/min per FL above 015
function b737HoldFlowAtFL(wt_t, fl_str) {
  const fl = parseInt(fl_str) || 15;
  const base = b737HoldFlow(wt_t);
  return Math.round(base + Math.max(0, fl - 15) * 0.15);
}

// ISA temperature at altitude (K)
function isaTemp(alt_ft) {
  return alt_ft <= 36089 ? 288.15 - 0.0019812 * alt_ft : 216.65;
}

// Pressure at altitude (Pa)
function pressureAtAlt(alt_ft) {
  if (alt_ft <= 36089) return 101325 * Math.pow(1 - 0.0000068756 * alt_ft, 5.2561);
  return 22632 * Math.exp(-(alt_ft - 36089) * 0.00004806);
}

function selectAirport(icao) {
  const ap = AIRPORTS.find(a => a.icao === icao);
  if (!ap) return;
  S.fuel.airport = icao;
  S.fuel.destType = ap.type;
  render();
}

// ══════════════════════════════════════════════════════
// TOOLS TAB — RDM CALCULATOR + PROB30/40 CHECKER
// ══════════════════════════════════════════════════════
function rdmSet(key, val) { S.rdm[key] = val; render(); }
function probSet(key, val) { S.prob[key] = val; render(); }
function apSet(icao) { S.ap.selected = S.ap.selected === icao ? null : icao; render(); }

function calcRDM() {
  const { runways, catConfig, lmCeiling, qmCeiling, qmVis, canada } = S.rdm;
  if (runways !== '2plus') return null; // Need 2+ runways
  const lm = parseFloat(lmCeiling) || 0;
  const qmC = parseFloat(qmCeiling) || 0;
  const qmV = parseFloat(qmVis) || 0;

  let ceiling, vis, item;
  if (catConfig === 'both-cat2') {
    // Item 1: Both runways have CAT II/III IAP
    ceiling = lm;   // Lowest Landing Minima ceiling
    vis = qmV;      // Lowest QM visibility
    item = 1;
  } else if (catConfig === 'one-cat2') {
    // Item 2: One runway CAT II/III, other any IAP
    ceiling = 400;
    vis = qmV + 400;
    item = 2;
  } else if (catConfig === 'no-cat2') {
    // Item 4: Both runways with IAP but no CAT II
    ceiling = qmC + 100;
    vis = qmV + 400;
    item = 4;
  } else {
    return null;
  }

  // Canada buffer (+100ft/+400m on final RDM values)
  if (canada === 'yes') { ceiling += 100; vis += 400; }

  return { ceiling: Math.round(ceiling), vis: Math.round(vis), item };
}

function timeToMins(hhmm) {
  if (!hhmm || !hhmm.includes(':')) return null;
  const parts = hhmm.split(':');
  const h = parseInt(parts[0]), m = parseInt(parts[1]);
  if (isNaN(h) || isNaN(m)) return null;
  return h * 60 + m;
}
function minsToTime(mins) {
  const m = ((mins % 1440) + 1440) % 1440;
  return String(Math.floor(m/60)).padStart(2,'0') + ':' + String(m%60).padStart(2,'0');
}

function checkProb() {
  const { isTaf3, tafIssue, eta, etouType } = S.prob;
  if (isTaf3 !== 'yes') return null;
  const issueMins = timeToMins(tafIssue);
  const etaMins = timeToMins(eta);
  if (issueMins === null || etaMins === null) return null;

  const tafEndMins = issueMins + 180; // 3 hours
  const etouOffset = etouType === 'isolated' ? 60 : 30;
  let etouStart = etaMins - 30;
  let etouEnd = etaMins + etouOffset;

  // Handle midnight rollover: if ETA appears before TAF issue, add 24 hours
  if (etaMins < issueMins) { etouStart += 1440; etouEnd += 1440; }

  const within = etouStart >= issueMins && etouEnd <= tafEndMins;
  return {
    within,
    tafEnd: minsToTime(tafEndMins),
    etouStart: minsToTime(etouStart),
    etouEnd: minsToTime(etouEnd),
    minutesShort: within ? 0 : Math.ceil(etouEnd - tafEndMins),
  };
}

// ══════════════════════════════════════════════════════
// HOLDING / IAS / COLD TEMP HELPERS
// ══════════════════════════════════════════════════════
function holdSet(key, val) { S.hold[key] = val; render(); }
function cttSet(key, val)  { S.ctt[key] = val;  render(); }
function iasSet(key, val)  {
  S.ias[key] = val;
  if (['ias','mach','tas'].includes(key) && val !== '') S.ias.last = key;
  render();
}

function calcHoldEndurance() {
  const h = S.hold;
  const fuel = parseFloat(h.fuel) || 0;
  const wt = parseFloat(h.weight) || 65;
  const flow = b737HoldFlowAtFL(wt, h.fl);
  const endurance = flow > 0 ? Math.floor(fuel / flow) : 0;
  const reqMin = parseFloat(h.reqMin) || 0;
  const reqFuel = Math.round(reqMin * flow);
  return { flow, endurance, reqFuel, surplus: fuel - reqFuel };
}

function calcColdTemp() {
  const height = parseFloat(S.ctt.height) || 0;
  const oat = parseFloat(S.ctt.temp);
  if (isNaN(oat) || height <= 0) return null;
  // ICAO cold temperature correction: ΔH = H × (ISA − OAT) / (273 + OAT)
  const correction = Math.round(height * (15 - oat) / (273 + oat));
  return { correction: Math.max(0, correction), oat };
}

function calcIAStool() {
  const d = S.ias;
  const alt = (parseInt(d.fl) || 0) * 100;
  if (alt <= 0) return null;
  const T_isa = isaTemp(alt);
  const T_act = T_isa + (parseFloat(d.isa) || 0);
  const P    = pressureAtAlt(alt);
  const P_sl = 101325;
  const a    = 661.5 * Math.sqrt(T_act / 288.15); // speed of sound at altitude (kt)
  const a_sl = 661.5;                               // speed of sound at sea level (kt)

  // Proper CAS formula using impact pressure (ICAO / subsonic compressible flow)
  function machToCAS(M) {
    const qc = P * (Math.pow(1 + 0.2 * M * M, 3.5) - 1);
    return a_sl * Math.sqrt(5 * (Math.pow(qc / P_sl + 1, 2 / 7) - 1));
  }
  function casTOMach(cas) {
    const qc = P_sl * (Math.pow(1 + 0.2 * Math.pow(cas / a_sl, 2), 3.5) - 1);
    return Math.sqrt(5 * (Math.pow(qc / P + 1, 2 / 7) - 1));
  }

  let ias, mach, tas;
  if (d.last === 'mach' && d.mach !== '') {
    mach = parseFloat(d.mach);
    tas  = mach * a;
    ias  = machToCAS(mach);
  } else if (d.last === 'tas' && d.tas !== '') {
    tas  = parseFloat(d.tas);
    mach = tas / a;
    ias  = machToCAS(mach);
  } else if (d.last === 'ias' && d.ias !== '') {
    ias  = parseFloat(d.ias);
    mach = casTOMach(ias);
    tas  = mach * a;
  } else {
    return null;
  }
  return {
    ias:  Math.round(ias),
    tas:  Math.round(tas),
    mach: mach.toFixed(3),
    sat:  Math.round(T_act - 273.15),
    a:    Math.round(a),
    isa_dev: Math.round(T_act - T_isa)
  };
}

function renderTools() {
  const r = S.rdm;
  const p = S.prob;

  // RDM needs
  const needsLM = r.runways === '2plus' && r.catConfig === 'both-cat2';
  const needsQMC = r.runways === '2plus' && r.catConfig === 'no-cat2';
  const needsQMV = r.runways === '2plus' && (r.catConfig === 'both-cat2' || r.catConfig === 'one-cat2' || r.catConfig === 'no-cat2');
  const rdmReady = r.runways === '2plus' && r.catConfig && (needsLM ? r.lmCeiling : true) && (needsQMC ? r.qmCeiling : true) && r.qmVis && r.canada;
  const rdm = rdmReady ? calcRDM() : null;

  const togR = (key, val, label) => `<button class="tog-btn ${r[key] === val ? 'on' : ''}" onclick="rdmSet('${key}','${val}')">${label}</button>`;
  const togP = (key, val, label) => `<button class="tog-btn ${p[key] === val ? 'on' : ''}" onclick="probSet('${key}','${val}')">${label}</button>`;

  const probResult = p.isTaf3 === 'yes' && p.tafIssue && p.eta ? checkProb() : null;

  return `
    <!-- RDM CALCULATOR -->
    <div class="card">
      <div class="card-label">🟡 RDM Calculator</div>
      <div style="font-size:13px;color:var(--text-muted);line-height:1.5;margin-bottom:14px">
        Reduced Determining Minima is only available <b>inflight at DPA</b> when the destination has a high-accuracy forecast. Values from EFF+ QM + additive (FSO 066/25).
      </div>

      <div class="field-group">
        <label class="field-label">Number of Suitable Runways at Destination</label>
        <div class="toggle-row">
          ${togR('runways','1','1 Runway')}
          ${togR('runways','2plus','2+ Runways')}
        </div>
      </div>

      ${r.runways === '1' ? `<div class="result-box red" style="margin-top:4px"><div class="result-title">🚫 RDM Not Available</div><div class="result-body">RDM requires 2 different suitable runways, each with an IAP. Only 1 suitable runway — RDM cannot be applied.</div></div>` : ''}

      ${r.runways === '2plus' ? `
      <div class="field-group fade-up">
        <label class="field-label">CAT II / III IAP Availability</label>
        <div class="toggle-row">
          ${togR('catConfig','both-cat2','Both runways ≥ CAT II')}
          ${togR('catConfig','one-cat2','One runway ≥ CAT II')}
          ${togR('catConfig','no-cat2','No CAT II available')}
        </div>
        <div class="field-hint">SA CAT II counts as CAT II for this purpose</div>
      </div>

      ${needsLM ? `
      <div class="field-group fade-up">
        <label class="field-label">Lowest Landing Minima Ceiling (DH/DA) — from approach chart</label>
        <div class="field-row"><input class="field-input" type="number" inputmode="numeric" placeholder="e.g. 100" value="${r.lmCeiling}" oninput="rdmSet('lmCeiling',this.value)"><span class="field-unit">ft</span></div>
        <div class="field-hint">Used for Item 1 (both runways have CAT II/III). Eg Sydney CAT II DH = 100ft</div>
      </div>` : ''}

      ${needsQMC ? `
      <div class="field-group fade-up">
        <label class="field-label">Lowest QM Ceiling — from EFF+ top note</label>
        <div class="field-row"><input class="field-input" type="number" inputmode="numeric" placeholder="e.g. 600" value="${r.qmCeiling}" oninput="rdmSet('qmCeiling',this.value)"><span class="field-unit">ft</span></div>
      </div>` : ''}

      ${needsQMV ? `
      <div class="field-group fade-up">
        <label class="field-label">Lowest QM Visibility — from EFF+ top note</label>
        <div class="field-row"><input class="field-input" type="number" inputmode="numeric" placeholder="e.g. 800" value="${r.qmVis}" oninput="rdmSet('qmVis',this.value)"><span class="field-unit">m</span></div>
        <div class="field-hint">Australian forecasts: use Visibility (not RVR). RVR applies only if reported in forecast.</div>
      </div>` : ''}

      ${r.catConfig ? `
      <div class="field-group fade-up">
        <label class="field-label">Is the destination in Canada?</label>
        <div class="toggle-row">${togR('canada','no','No')}${togR('canada','yes','Yes (+100ft/400m buffer)')}</div>
        <div class="field-hint">CASA requires an additional 100ft/400m buffer for Canadian airports</div>
      </div>` : ''}
      ` : ''}

      ${rdm ? `
      <div class="rdm-result fade-up">
        <div class="rdm-label" style="margin-bottom:4px">Item ${rdm.item} — Reduced Determining Minima</div>
        <div class="rdm-value">${rdm.ceiling}ft / ${rdm.vis.toLocaleString()}m</div>
        <div class="rdm-label" style="margin-top:8px">Ceiling: ${rdm.ceiling}ft &nbsp;|&nbsp; Visibility: ${rdm.vis}m</div>
        ${r.canada === 'yes' ? '<div class="rdm-label" style="color:#d97706;margin-top:4px">Includes +100ft/+400m Canada buffer</div>' : ''}
      </div>
      <div class="info-box" style="margin-top:12px">Compare these RDM values against the current destination forecast. If forecast ≥ RDM, the destination meets reduced criteria and RDM may be applied at DPA.</div>
      ` : ''}

      <button class="btn btn-ghost" onclick="S.rdm={runways:null,catConfig:null,lmCeiling:'',qmCeiling:'',qmVis:'',canada:null};render()">🔄 Reset RDM</button>
    </div>

    <!-- PROB30/40 CHECKER -->
    <div class="card">
      <div class="card-label">🌦️ PROB30/40 Checker</div>
      <div style="font-size:13px;color:var(--text-muted);line-height:1.5;margin-bottom:14px">
        PROB30/40 deteriorations in a TAF3 need <b>not</b> be applied if the entire ETOU window falls within the first 3 hours of the TAF3 issue time. (Part 121 MOS 4.06(5) and (7))
      </div>

      <div class="field-group">
        <label class="field-label">Is this a TAF3 (or equivalent HF-TAF)?</label>
        <div class="toggle-row">
          ${togP('isTaf3','yes','Yes — TAF3 / HF-TAF')}
          ${togP('isTaf3','no','No — standard TAF')}
        </div>
      </div>

      ${p.isTaf3 === 'no' ? `<div class="result-box red" style="margin-top:4px"><div class="result-title">PROB30/40 Must Be Applied</div><div class="result-body">This concession only applies to TAF3 or High Frequency TAF forecasts. A standard TAF requires PROB30/40 to be applied.</div></div>` : ''}

      ${p.isTaf3 === 'yes' ? `
      <div class="field-group fade-up">
        <label class="field-label">TAF3 Issue Time (UTC)</label>
        <div class="field-row"><input class="field-input time-input" type="time" value="${p.tafIssue}" oninput="probSet('tafIssue',this.value)"><span class="field-unit">Z</span></div>
      </div>
      <div class="field-group fade-up">
        <label class="field-label">ETA at Destination (UTC)</label>
        <div class="field-row"><input class="field-input time-input" type="time" value="${p.eta}" oninput="probSet('eta',this.value)"><span class="field-unit">Z</span></div>
      </div>
      <div class="field-group fade-up">
        <label class="field-label">ETOU Type</label>
        <div class="toggle-row">
          ${togP('etouType','standard','Standard (ETA ±30 min)')}
          ${togP('etouType','isolated','Isolated (ETA −30/+60 min)')}
        </div>
      </div>
      ` : ''}

      ${probResult ? `
      <div class="prob-result ${probResult.within ? 'prob-not-apply' : 'prob-apply'} fade-up">
        <div class="prob-title">${probResult.within ? '✅ PROB30/40 Need Not Be Applied' : '⚠️ PROB30/40 Must Be Applied'}</div>
        <div class="prob-detail">
          ETOU window: <b>${probResult.etouStart}Z – ${probResult.etouEnd}Z</b><br>
          TAF3 first 3 hours ends: <b>${probResult.tafEnd}Z</b><br>
          ${probResult.within
            ? 'The entire ETOU falls within the first 3 hours of the TAF3. PROB30/40 may be disregarded for alternate planning purposes.'
            : `ETOU extends ${probResult.minutesShort} minute${probResult.minutesShort !== 1 ? 's' : ''} beyond the TAF3 first 3-hour period. PROB30/40 must be applied.`}
        </div>
      </div>
      ` : ''}
    </div>

    <!-- HOLDING + ENDURANCE -->
    ${(() => {
      const h = S.hold;
      const flOptions = ['015','050','100','150','200','250','300','350'].map(f =>
        `<button class="tog-btn ${h.fl===f?'on':''}" onclick="holdSet('fl','${f}')">${f==='015'?'1500ft':'FL'+f}</button>`
      ).join('');
      const res = (h.fuel && h.weight) ? calcHoldEndurance() : null;
      return `<div class="card">
      <div class="card-label">⏱️ Holding + Endurance</div>
      <div style="font-size:13px;color:var(--text-muted);line-height:1.5;margin-bottom:14px">Calculate holding endurance or fuel required for a given hold time. Uses estimated B737-800 fuel flow at weight and altitude.</div>
      <div class="field-group">
        <label class="field-label">Aircraft Weight (t)</label>
        <div class="field-row"><input class="field-input" type="number" inputmode="decimal" placeholder="e.g. 65" value="${h.weight}" oninput="holdSet('weight',this.value)" style="max-width:110px"><span class="field-unit">tonnes</span></div>
      </div>
      <div class="field-group">
        <label class="field-label">Holding Altitude</label>
        <div class="toggle-row" style="flex-wrap:wrap">${flOptions}</div>
      </div>
      <div class="field-group">
        <label class="field-label">Fuel Available for Hold (kg)</label>
        <div class="field-row"><input class="field-input" type="number" inputmode="numeric" placeholder="e.g. 3000" value="${h.fuel}" oninput="holdSet('fuel',this.value)"><span class="field-unit">kg</span></div>
      </div>
      <div class="field-group">
        <label class="field-label">Required Hold Time (min) — optional</label>
        <div class="field-row"><input class="field-input" type="number" inputmode="numeric" placeholder="e.g. 30" value="${h.reqMin}" oninput="holdSet('reqMin',this.value)" style="max-width:110px"><span class="field-unit">min</span></div>
      </div>
      ${res ? `<div class="rdm-result fade-up" style="${res.surplus < 0 ? 'background:#fff1f2;border-color:#fca5a5' : ''}">
        <div class="rdm-label">Est. hold fuel flow: ~${res.flow} kg/min</div>
        <div class="rdm-value" style="${res.surplus < 0 ? 'color:#dc2626' : ''}">${res.endurance} min endurance</div>
        <div class="rdm-label" style="margin-top:8px">Available fuel: ${parseInt(h.fuel).toLocaleString()} kg</div>
        ${res.reqFuel > 0 ? `<div class="rdm-label" style="margin-top:4px;${res.surplus < 0 ? 'color:#dc2626;font-weight:700' : 'color:#166534;font-weight:700'}">
          ${res.surplus >= 0 ? `✅ ${res.reqFuel.toLocaleString()} kg required — ${res.surplus.toLocaleString()} kg surplus` : `⚠️ ${res.reqFuel.toLocaleString()} kg required — ${Math.abs(res.surplus).toLocaleString()} kg SHORT`}
        </div>` : ''}
      </div>
      <div class="info-box" style="margin-top:10px">Fuel flow is approximate (B737-800 model). Verify endurance from FMS or OFP data.</div>` : ''}
      <button class="btn btn-ghost" style="margin-top:8px" onclick="S.hold={weight:'',fl:'015',fuel:'',reqMin:''};render()">🔄 Reset</button>
    </div>`;
    })()}

    <!-- IAS / MACH / TAS -->
    ${(() => {
      const d = S.ias;
      const res = calcIAStool();
      return `<div class="card">
      <div class="card-label">✈️ IAS / Mach / TAS</div>
      <div style="font-size:13px;color:var(--text-muted);line-height:1.5;margin-bottom:14px">Enter any one speed plus altitude — the other two are calculated using the ISA model. Edit a field to set it as the reference.</div>
      <div class="field-group">
        <label class="field-label">Flight Level / Altitude</label>
        <div class="field-row"><input class="field-input" type="number" inputmode="numeric" placeholder="e.g. 350" value="${d.fl}" oninput="iasSet('fl',this.value)" style="max-width:110px"><span class="field-unit">FL</span></div>
      </div>
      <div class="field-group">
        <label class="field-label">ISA Deviation (°C) — default 0</label>
        <div class="field-row"><input class="field-input" type="number" inputmode="numeric" placeholder="0" value="${d.isa}" oninput="iasSet('isa',this.value)" style="max-width:110px"><span class="field-unit">°C ISA±</span></div>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:12px">
        <div class="field-group" style="margin:0">
          <label class="field-label" style="${d.last==='ias'?'color:var(--red)':''}">IAS (kt)</label>
          <input class="field-input" type="number" inputmode="numeric" placeholder="e.g. 280" value="${res && d.last!=='ias' ? res.ias : d.ias}" oninput="iasSet('ias',this.value)" style="${d.last==='ias'?'border-color:var(--red)':''}">
        </div>
        <div class="field-group" style="margin:0">
          <label class="field-label" style="${d.last==='mach'?'color:var(--red)':''}">Mach</label>
          <input class="field-input" type="number" inputmode="decimal" step="0.001" placeholder="e.g. .785" value="${res && d.last!=='mach' ? res.mach : d.mach}" oninput="iasSet('mach',this.value)" style="${d.last==='mach'?'border-color:var(--red)':''}">
        </div>
        <div class="field-group" style="margin:0">
          <label class="field-label" style="${d.last==='tas'?'color:var(--red)':''}">TAS (kt)</label>
          <input class="field-input" type="number" inputmode="numeric" placeholder="e.g. 460" value="${res && d.last!=='tas' ? res.tas : d.tas}" oninput="iasSet('tas',this.value)" style="${d.last==='tas'?'border-color:var(--red)':''}">
        </div>
      </div>
      ${res ? `<div class="airport-info-box fade-up" style="margin-top:4px">
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;font-size:13px">
          <div><span style="color:var(--text-muted);font-size:11px;font-weight:700">SAT</span><br><b>${res.sat}°C</b></div>
          <div><span style="color:var(--text-muted);font-size:11px;font-weight:700">Speed of Sound</span><br><b>${res.a} kt</b></div>
        </div>
      </div>` : ''}
      <button class="btn btn-ghost" style="margin-top:8px" onclick="S.ias={fl:'',isa:'0',ias:'',mach:'',tas:'',last:''};render()">🔄 Reset</button>
    </div>`;
    })()}

    <!-- COLD TEMPERATURE CORRECTIONS -->
    ${(() => {
      const c = S.ctt;
      const res = calcColdTemp();
      const correctionNeeded = parseFloat(c.temp) < 0;
      return `<div class="card">
      <div class="card-label">🌨️ Cold Temperature Corrections</div>
      <div style="font-size:13px;color:var(--text-muted);line-height:1.5;margin-bottom:14px">
        Adds correction to published approach heights when OAT is below ISA. Uses ICAO formula: ΔH = H × (15 − OAT) / (273 + OAT). Applies to DA/MDA and all step-down fixes.
      </div>
      <div class="field-group">
        <label class="field-label">Airport Temperature (OAT °C)</label>
        <div class="field-row"><input class="field-input" type="number" inputmode="numeric" placeholder="e.g. -10" value="${c.temp}" oninput="cttSet('temp',this.value)" style="max-width:110px"><span class="field-unit">°C</span></div>
        ${c.temp !== '' && !correctionNeeded && parseFloat(c.temp) >= 0 ? '<div class="field-hint">Corrections only required when OAT is below 0°C (ISA −15°C).</div>' : ''}
      </div>
      <div class="field-group">
        <label class="field-label">Height Above Altimeter Setting Source (ft)</label>
        <div class="field-row"><input class="field-input" type="number" inputmode="numeric" placeholder="e.g. 1000" value="${c.height}" oninput="cttSet('height',this.value)"><span class="field-unit">ft</span></div>
        <div class="field-hint">Height of the procedure altitude (DA, MDA, step-down fix) above the airport elevation.</div>
      </div>
      ${res ? `<div class="${res.correction > 0 ? 'result-box amber' : 'result-box green'} fade-up" style="margin-top:4px">
        <div class="result-title">${res.correction > 0 ? '⚠️ Add Correction to Published Height' : '✅ No Correction Required'}</div>
        <div class="result-body" style="font-size:20px;font-weight:800;margin-bottom:6px">+ ${res.correction} ft</div>
        <div class="result-body">Published height: ${parseInt(c.height).toLocaleString()} ft → Corrected: ${(parseInt(c.height) + res.correction).toLocaleString()} ft<br>
        OAT ${res.oat}°C, ${c.height} ft AGL above altimeter source</div>
      </div>
      <div class="info-box" style="margin-top:10px">Add this correction to <b>all</b> procedure altitudes: DA/MDA, step-down fixes, and published minima. Some operators use rounded ICAO table values — confirm with your Operations Manual.</div>` : ''}
      <button class="btn btn-ghost" style="margin-top:8px" onclick="S.ctt={height:'',temp:''};render()">🔄 Reset</button>
    </div>`;
    })()}

    <!-- AIRPORT PROFILES -->
    <div class="card">
      <div class="card-label">🗺️ Airport Profiles</div>
      <div style="font-size:13px;color:var(--text-muted);line-height:1.5;margin-bottom:14px">
        Tap an airport to see its runway config, approach types, and planning notes. Specific DM/QM values are always from EFF+.
      </div>

      <div class="airport-group-label">Domestic</div>
      <div class="airport-scroll">
        ${AIRPORTS.filter(a=>a.g==='domestic').map(a=>`<button class="airport-chip ${S.ap.selected===a.icao?'on':''}" onclick="apSet('${a.icao}')">${a.iata} ${a.name}</button>`).join('')}
      </div>

      <div class="airport-group-label" style="margin-top:12px">International — Single Runway</div>
      <div class="airport-scroll">
        ${AIRPORTS.filter(a=>a.g==='intl-s').map(a=>`<button class="airport-chip ${S.ap.selected===a.icao?'on':''}" onclick="apSet('${a.icao}')">${a.iata} ${a.name}</button>`).join('')}
      </div>

      <div class="airport-group-label" style="margin-top:12px">International — Multi-Runway</div>
      <div class="airport-scroll">
        ${AIRPORTS.filter(a=>a.g==='intl-m').map(a=>`<button class="airport-chip ${S.ap.selected===a.icao?'on':''}" onclick="apSet('${a.icao}')">${a.iata} ${a.name}</button>`).join('')}
      </div>

      ${(() => {
        const ap = AIRPORTS.find(a => a.icao === S.ap.selected);
        if (!ap) return `<div class="info-box" style="margin-top:12px">Select an airport above to view its profile.</div>`;
        const typeLabel = ap.type === 'domestic' ? '🇦🇺 Domestic' : ap.type === 'single-intl' ? '🌏 International (Single Runway)' : '🌏 International (Multi-Runway)';
        const holdingBadge = ap.holding25
          ? `<span style="background:#fef3c7;color:#92400e;font-size:11px;font-weight:700;padding:2px 8px;border-radius:4px;margin-left:6px">⏱️ 25 min Holding</span>`
          : `<span style="background:#dcfce7;color:#166534;font-size:11px;font-weight:700;padding:2px 8px;border-radius:4px;margin-left:6px">✅ No 25 min Hold</span>`;
        return `
        <div class="airport-info-box fade-up" style="margin-top:14px">
          <div class="ai-name" style="font-size:15px;display:flex;align-items:center;flex-wrap:wrap;gap:4px">
            ${ap.name} (${ap.iata} / ${ap.icao}) ${holdingBadge}
          </div>
          <div class="ai-type" style="margin-top:6px;margin-bottom:10px;color:var(--text-muted)">${typeLabel}</div>
          <div style="display:grid;gap:8px">
            <div>
              <div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;color:var(--text-muted);margin-bottom:3px">Runways</div>
              <div style="font-size:13px">${ap.runwayDesc}</div>
            </div>
            <div>
              <div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;color:var(--text-muted);margin-bottom:3px">Approach Types</div>
              <div style="font-size:13px">${ap.approaches}</div>
            </div>
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
              <div style="background:#fff7ed;border-radius:8px;padding:9px 11px">
                <div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;color:#92400e;margin-bottom:3px">DM Category</div>
                <div style="font-size:12px;color:#92400e;font-weight:600">${ap.dmNote}</div>
              </div>
              <div style="background:#f0f9ff;border-radius:8px;padding:9px 11px">
                <div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;color:#075985;margin-bottom:3px">QM (as Alternate)</div>
                <div style="font-size:12px;color:#075985;font-weight:600">${ap.qmNote}</div>
              </div>
            </div>
            <div>
              <div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;color:var(--text-muted);margin-bottom:3px">Planning Notes</div>
              <div style="font-size:13px;line-height:1.55">${ap.note}</div>
            </div>
          </div>
        </div>`;
      })()}
    </div>

    <div class="disclaimer">🛠️ Tools are for study and situational awareness only. Always verify against EFF+, the OFP, and Operations Manual (FAM).</div>`;
}

// ══════════════════════════════════════════════════════
// REFERENCE TAB
// ══════════════════════════════════════════════════════
const REF_SECTIONS = [
  { key:'minima', title:'📋 Planning Minima Types', body:`
    <table class="mini-table"><thead><tr><th>Type</th><th>Used At</th><th>Purpose</th></tr></thead><tbody>
      <tr><td class="td-dm">DM<br><small>Determining Minima</small></td><td>Destination &amp; DPA Airport (preflight and inflight)</td><td>Determines whether an alternate is <em>needed</em></td></tr>
      <tr><td class="td-rdm">RDM<br><small>Reduced Determining Minima</small></td><td>Destination only (inflight at DPA only)</td><td>Lower DM when TAF3/HF-TAF available. Calculated from QM + additive. Requires 2 different runways each with an IAP.</td></tr>
      <tr><td class="td-qm">QM<br><small>Qualifying Minima</small></td><td>Destination Alternate</td><td><em>Qualifies</em> an airport for use as a Destination Alternate</td></tr>
      <tr><td class="td-lm">LM<br><small>Landing Minima</small></td><td>All airports — post-DPA</td><td>Minimum for an approach attempt. Applied to all airports after DPA is passed compliantly.</td></tr>
    </tbody></table>`},
  { key:'dpa', title:'✈️ Decision Point Approach (DPA)', body:`
    <div class="ref-item"><div class="ref-term">What is DPA?</div><div class="ref-def">The point of commitment. Before DPA: two safe landing options. After DPA: one safe landing option. The flight is effectively re-dispatched here.</div></div>
    <div class="ref-item"><div class="ref-term">DPA Constraints</div><div class="ref-def">Maximum <b>90 minutes</b> from Destination. Cannot be beyond Top of Descent. May be recalculated inflight based on any Cat A or B airport (including back to Departure Airport).</div></div>
    <div class="ref-item"><div class="ref-term">2× DPA Airports</div><div class="ref-def">Used when destination is below DM and no suitable alternate exists. Allows departure without Destination Alternate Fuel. One acts as planning destination, the other as DPA Airport.</div></div>
    <div class="ref-item"><div class="ref-term">After DPA</div><div class="ref-def">DPA fuel requirements (NDA, holding, alternate) are released. Only FRF must be protected. LM applies to all airport assessments.</div></div>`},
  { key:'etou', title:'⏱️ Estimated Time of Use (ETOU)', body:`
    <div class="ref-item"><div class="ref-term">Standard ETOU</div><div class="ref-def">ETA ± 30 minutes. Weather and airport lighting (if night) assessed for this window.</div></div>
    <div class="ref-item"><div class="ref-term">Isolated Destination ETOU</div><div class="ref-def">30 minutes before ETA to 60 minutes after ETA.</div></div>
    <div class="ref-item"><div class="ref-term">Assessed at ETOU</div><div class="ref-def">Relevant Weather Conditions (INTER, TEMPO) and airport lighting (when ETOU includes night).</div></div>
    <div class="ref-item"><div class="ref-term">Assessed at ETA</div><div class="ref-def">Runway suitability and navaid availability. All other requirements tied to ETA.</div></div>
    <div class="ref-item"><div class="ref-term">Holding Fuel &amp; ETOU</div><div class="ref-def">Carrying Holding Fuel equivalent to a transient weather period (eg INTER or TEMPO) removes the requirement to plan for that Relevant Weather Condition.</div></div>`},
  { key:'fuel', title:'⛽ Fuel Elements Summary', body:[
    { abbr:'FRF',  name:'Final Reserve Fuel',           def:'30 min holding at 1500ft above destination. Always required. Cannot be planned to use.' },
    { abbr:'NDA',  name:'15 min No Dest Alternate Fuel', def:'Required at DPA if no Destination Alternate carried. Only required inflight at DPA — may be repurposed immediately after DPA. = FRF × 0.5.' },
    { abbr:'HOLD', name:'25 min Single-RWY Holding',    def:'Required at DPA for single-runway destinations outside Australian territory (when no alternate). = FRF × 5/6. Covered if weather holding ≥ 25 min planned. OFP EOD ≥ 80 min confirms coverage preflight.' },
    { abbr:'ALT',  name:'Destination Alternate Fuel',   def:'When carried, removes NDA and 25 min holding requirements. Shown on OFP.' },
    { abbr:'CONT', name:'Contingency Fuel',             def:'Min 5% of trip fuel DPA→Dest. Constellation plans up to 10% (fleet cap). Surplus (above 5%) can contribute to NDA fuel shortfall.' },
    { abbr:'EOD',  name:'Endurance Over Destination',   def:'Fuel expressed as minutes of holding at destination. OFP EOD ≥ 80 min confirms FRF (30) + 25 min holding + 15 min NDA are covered for single-runway international.' },
  ].map(i => `<div class="ref-item"><div class="ref-term"><span class="ref-badge">${i.abbr}</span> ${i.name}</div><div class="ref-def">${i.def}</div></div>`).join('') },
  { key:'phases', title:'📍 Policy Phases Summary', body:`
    <div class="result-box amber" style="margin-bottom:10px"><div class="result-title">Phase 1: Preflight to DPA</div><div class="result-body">Maintain <b>two</b> safe landing options. Alternate planned if required. DPA Airport ≥ DM confirmed. All fuel elements provided for on OFP.</div></div>
    <div class="result-box blue" style="margin-bottom:10px"><div class="result-title">Phase 1B: Inflight to DPA</div><div class="result-body">Maintain General Inflight Fuel Requirements. DPA Airport(s) remain suitable. Destination not protected — assessed at DPA.</div></div>
    <div class="result-box green"><div class="result-title">Phase 2: DPA Onwards</div><div class="result-body">Commit to <b>one</b> safe landing option. Proceed to destination. Manage flight to land safely at or above LM with FRF intact.</div></div>`},
  { key:'single', title:'🛬 Single-Runway Airports', body:`
    <div class="ref-item"><div class="ref-term">'Separate' vs 'Different' Runways</div><div class="ref-def"><b>Different</b> = different runway numbers (eg MEL 16 and 34). <b>Separate</b> = physically separate — if one closes end-to-end, the other's LDA remains usable. On the Qantas network, separate runways always have no intersecting LDA (eg YSSY 16L/16R).</div></div>
    <div class="ref-item"><div class="ref-term">25 min Holding Applies When</div><div class="ref-def">Destination is outside Australian territory, has only one suitable runway, and no Destination Alternate is carried. Calculated as FRF × 5/6 (≈ FRF × 0.833).</div></div>
    <div class="ref-item"><div class="ref-term">OFP Verification Preflight</div><div class="ref-def">OFP Destination EOD ≥ 80 min confirms FRF (30 min) + 25 min holding + 15 min NDA = 70 min are provided for, with margin.</div></div>
    <div class="ref-item"><div class="ref-term">Key Airports (25 min applies, no alt)</div><div class="ref-def">Auckland, Christchurch, Wellington, Bali, Nadi, Port Vila, Apia, Nuku'alofa, Noumea, Palau, Manila (06/24 only), Port Moresby (14L/32R only).</div></div>`},

  { key:'fc-preflight', title:'🔀 Flowchart — Preflight Destination Alternate', body:`
    <div class="fc">
      <div class="fc-start">PREFLIGHT — DESTINATION ALTERNATE PLANNING</div>
      <div class="fc-arrow">↓</div>
      <div class="fc-q">Single runway outside Australia?</div>
      <div class="fc-split">

        <div class="fc-col">
          <div class="fc-tag n">NO</div>
          <div class="fc-arrow">↓</div>
          <div class="fc-box g">
            <div class="fc-box-title">✅ Alt NOT Required</div>
            Ensure fuel at DPA for <b>either</b>:
            <div style="margin-top:5px">• 15 min NDA Fuel</div>
            <div class="fc-or">— OR —</div>
            <div>• Destination Alternate Fuel</div>
          </div>
        </div>

        <div class="fc-col">
          <div class="fc-tag y">YES</div>
          <div class="fc-arrow">↓</div>
          <div class="fc-q">Dest ≥ DM at ETOU?</div>
          <div class="fc-arrow">↓</div>

          <div class="fc-split">
            <div class="fc-col">
              <div class="fc-tag y">YES ≥ DM</div>
              <div class="fc-arrow">↓</div>
              <div class="fc-box a">
                <div class="fc-box-title">⚠️ Alt NOT Required</div>
                Ensure fuel at DPA for <b>either</b>:
                <div style="margin-top:5px">• ≥ 25 min Holding<br>&nbsp;&nbsp;+ 15 min NDA</div>
                <div class="fc-or">— OR —</div>
                <div>• Dest Alternate Fuel</div>
              </div>
            </div>

            <div class="fc-col">
              <div class="fc-tag n">below DM</div>
              <div class="fc-arrow">↓</div>
              <div class="fc-q">Can carry Dest Alt?</div>
              <div class="fc-arrow">↓</div>
              <div class="fc-split">
                <div class="fc-col">
                  <div class="fc-tag y">YES</div>
                  <div class="fc-arrow">↓</div>
                  <div class="fc-box b">
                    <div class="fc-box-title">Plan Dest Alt</div>
                    ≥ QM at ETOU<br>
                    <span style="font-size:10px">(or Holding Fuel for wx)</span>
                  </div>
                </div>
                <div class="fc-col">
                  <div class="fc-tag n">NO</div>
                  <div class="fc-arrow">↓</div>
                  <div class="fc-box r">
                    <div class="fc-box-title">Plan 2× DPA Airports</div>
                    Each ≥ DM<br>
                    <span style="font-size:10px">FAM 16.8.2</span>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>

      </div>
      <div class="fc-note" style="margin-top:10px">Not applicable to Isolated Destination Airports. Note: Landing Minima is not assessed at the Preflight stage.</div>
    </div>`},

  { key:'fc-dpa', title:'🔀 Flowchart — At DPA (includes RDM)', body:`
    <div class="fc">
      <div class="fc-start">AT DPA — DESTINATION ASSESSMENT</div>
      <div class="fc-note" style="margin:4px 0 8px">If a Dest Alternate is already carried, only the &lt; Landing Minima branch applies (Dest Alt must then be ≥ DM).</div>
      <div class="fc-q">Single runway outside Australia?</div>
      <div class="fc-split">

        <div class="fc-col">
          <div class="fc-tag n">NO</div>
          <div class="fc-arrow">↓</div>
          <div class="fc-box g">
            <div class="fc-box-title">✅ Alt NOT Required</div>
            Ensure on board <b>either</b>:
            <div style="margin-top:5px">• 15 min NDA Fuel</div>
            <div class="fc-or">— OR —</div>
            <div>• Dest Alternate Fuel</div>
          </div>
        </div>

        <div class="fc-col">
          <div class="fc-tag y">YES</div>
          <div class="fc-arrow">↓</div>
          <div class="fc-q">Dest at ETOU?</div>
          <div class="fc-arrow">↓</div>

          <div class="fc-box a" style="margin-bottom:6px">
            <div class="fc-tag y" style="margin-bottom:4px">≥ DM</div>
            <div class="fc-box-title" style="font-size:11px">Alt NOT Required</div>
            Ensure on board <b>either</b>:<br>
            • ≥ 25 min Holding + 15 min NDA<br>
            <span style="font-size:10px;font-style:italic">or</span><br>
            • Dest Alternate Fuel
          </div>

          <div class="fc-box b" style="margin-bottom:6px">
            <div class="fc-tag bm" style="margin-bottom:4px">below DM, ≥ LM</div>
            <div class="fc-box-title" style="font-size:11px">RDM Available?</div>
            <div class="fc-split" style="margin-top:5px">
              <div class="fc-col">
                <div class="fc-tag y" style="font-size:9px">YES — Dest ≥ RDM</div>
                <div class="fc-box g" style="margin-top:3px;font-size:10px">
                  Carry Dest Alt<br>≥ <b>QM</b> at ETOU
                </div>
              </div>
              <div class="fc-col">
                <div class="fc-tag n" style="font-size:9px">NO RDM / below RDM</div>
                <div class="fc-box a" style="margin-top:3px;font-size:10px">
                  Carry Dest Alt<br>≥ <b>QM</b> at ETOU
                  <div style="font-size:9px;margin-top:2px">(or Holding Fuel)</div>
                </div>
              </div>
            </div>
            <div class="fc-note" style="margin-top:5px">RDM requires: TAF3 or HF-TAF + 2 suitable runways each with IAP. See RDM Calculator in Tools tab.</div>
          </div>

          <div class="fc-box r">
            <div class="fc-tag lm" style="margin-bottom:4px">below LM</div>
            <div class="fc-box-title" style="font-size:11px">Carry Dest Alt</div>
            ≥ <b>DM (or RDM)</b> at ETOU<br>
            <span style="font-size:10px">FAM 16.7.2.2</span>
          </div>
        </div>

      </div>
      <div style="margin-top:8px;background:#fee2e2;border:1px solid #fca5a5;border-radius:8px;padding:8px 10px;font-size:11px;font-weight:700;text-align:center;color:#991b1b">
        ⛔ If no requirement above can be met → DIVERT to Cat A or B Airport
      </div>
      <div class="fc-note" style="margin-top:6px">Not applicable to Isolated Destination Airports.</div>
    </div>`},

  { key:'fc-rdm', title:'🔀 Flowchart — Applying RDM', body:`
    <div class="fc">
      <div class="fc-start">INFLIGHT — APPLYING RDM AT DPA</div>
      <div class="fc-note" style="margin:4px 0 8px">Prerequisites: TAF3 / ICAO Trend / High-Freq TAF current. Holding fuel sufficient to cover ATC delays.</div>
      <div class="fc-q">2 different suitable runways, each with an IAP?</div>
      <div class="fc-split">
        <div class="fc-col">
          <div class="fc-tag n">NO</div>
          <div class="fc-arrow">↓</div>
          <div class="fc-box r"><div class="fc-box-title">🚫 RDM Not Available</div>Only 1 suitable runway — RDM cannot be applied.</div>
        </div>
        <div class="fc-col">
          <div class="fc-tag y">YES</div>
          <div class="fc-arrow">↓</div>
          <div class="fc-q">Any runway with CAT II/III IAP?</div>
          <div class="fc-arrow">↓</div>

          <div style="margin-bottom:6px">
            <div class="fc-split">
              <div class="fc-col">
                <div class="fc-tag y" style="font-size:9px">Both ≥ CAT II</div>
                <div class="fc-box g" style="margin-top:3px">
                  <div class="fc-box-title" style="font-size:11px">Item 1 — RDM</div>
                  <div style="font-size:10px">Ceiling: Lowest LM DH/DA<br>Vis: Lowest QM Vis</div>
                  <div class="fc-note">Eg: YSSY CAT II DH 100ft → RDM ceiling 100ft</div>
                </div>
              </div>
              <div class="fc-col">
                <div class="fc-tag bm" style="font-size:9px">One ≥ CAT II</div>
                <div class="fc-box a" style="margin-top:3px">
                  <div class="fc-box-title" style="font-size:11px">Item 2 — RDM</div>
                  <div style="font-size:10px">Ceiling: QM Ceil + 0ft<br>Vis: QM Vis + 0m</div>
                  <div class="fc-note">Uses QM ceiling unmodified</div>
                </div>
              </div>
            </div>
          </div>

          <div class="fc-q" style="font-size:11px">Separate suitable runways?</div>
          <div class="fc-split" style="margin-top:4px">
            <div class="fc-col">
              <div class="fc-tag y">YES — separate</div>
              <div class="fc-box b" style="margin-top:3px">
                <div class="fc-box-title" style="font-size:11px">Item 3a — RDM</div>
                <div style="font-size:10px">Ceiling: QM Ceil<br>Vis: QM Vis</div>
              </div>
            </div>
            <div class="fc-col">
              <div class="fc-tag n">NO — not separate</div>
              <div class="fc-box p" style="margin-top:3px">
                <div class="fc-box-title" style="font-size:11px">Item 3b — RDM</div>
                <div style="font-size:10px">Ceiling: QM Ceil +100ft<br>Vis: QM Vis +400m</div>
              </div>
            </div>
          </div>
          <div class="fc-note" style="margin-top:6px">Canada buffer: add +100ft/+400m to the above values at Canadian airports.</div>
        </div>
      </div>
      <div class="fc-note" style="margin-top:8px">* When forecast contains RVR and/or Visibility, assess each against its respective minima. If CAT I DH is 200ft (eg AKL RW23L), ceiling may be 300ft for Item 1.</div>
    </div>`},

  { key:'fc-matrix', title:'📋 Fuel Requirements Matrix', body:`
    <div style="overflow-x:auto;-webkit-overflow-scrolling:touch">
    <div style="font-size:11px;color:var(--text-muted);margin-bottom:8px">Scroll horizontally to see all phases →</div>
    <table class="mx-table" style="min-width:560px">
      <thead>
        <tr>
          <th style="width:80px">Fuel Element</th>
          <th class="mx-ph" colspan="2">PREFLIGHT</th>
          <th class="mx-ph" colspan="3">AT DPA</th>
          <th class="mx-ph">AFTER DPA</th>
        </tr>
        <tr>
          <th></th>
          <th>To Dest</th>
          <th>DP1/DPD (to DPA Airport)</th>
          <th>At DPA (to Dest)</th>
          <th>At DPA (Dest→Alt)</th>
          <th>CPE (at landing)</th>
          <th>After DPA passed</th>
        </tr>
      </thead>
      <tbody>
        <tr><td style="font-weight:700;text-align:left;background:var(--card)">Airport Cat</td><td>A or B</td><td>A or B</td><td>A, B, C or D</td><td>A, B or C</td><td>A or B</td><td>A or B</td></tr>
        <tr><td style="font-weight:700;text-align:left;background:var(--card)">Planning Minima</td><td>Determining</td><td>Determining</td><td>Determining / Reduced Determining</td><td>Qualifying</td><td>Landing</td><td>Landing</td></tr>
        <tr><td style="font-weight:700;text-align:left;background:var(--card)">Trip Fuel</td><td class="mx-req">Planned</td><td class="mx-req">Planned</td><td class="mx-req">Actual</td><td class="mx-req">Actual</td><td class="mx-na">—</td><td class="mx-na">—</td></tr>
        <tr><td style="font-weight:700;text-align:left;background:var(--card)">Dest Alt Fuel</td><td class="mx-req">If req</td><td class="mx-na">—</td><td class="mx-req">If req</td><td class="mx-na">—</td><td class="mx-na">—</td><td class="mx-na">—</td></tr>
        <tr><td style="font-weight:700;text-align:left;background:var(--card)">Arrival Allow.</td><td class="mx-req">✓</td><td class="mx-req">✓</td><td class="mx-na">—</td><td class="mx-na">—</td><td class="mx-na">—</td><td class="mx-na">—</td></tr>
        <tr><td style="font-weight:700;text-align:left;background:var(--card)">Contingency</td><td class="mx-req">✓</td><td class="mx-req">✓</td><td class="mx-na">—</td><td class="mx-na">—</td><td class="mx-req">✓</td><td class="mx-na">—</td></tr>
        <tr><td style="font-weight:700;text-align:left;background:var(--card)">FRF</td><td class="mx-req">30 min</td><td class="mx-req">15 min</td><td class="mx-req">15 min</td><td class="mx-req">15 min</td><td class="mx-req">30 min</td><td class="mx-req">30 min</td></tr>
        <tr>
          <td style="font-weight:700;text-align:left;background:var(--card)">Holding</td>
          <td class="mx-opt" style="font-size:9px">WX/TFC<br>+ Sgl RWY ≥25 min if applic</td>
          <td class="mx-opt" style="font-size:9px">WX/TFC</td>
          <td class="mx-opt" style="font-size:9px">WX/TFC<br>+ Sgl RWY ≥25 min if applic</td>
          <td class="mx-opt" style="font-size:9px">WX only</td>
          <td class="mx-opt" style="font-size:9px">WX/TFC</td>
          <td class="mx-opt" style="font-size:9px">WX/TFC</td>
        </tr>
        <tr><td style="font-weight:700;text-align:left;background:var(--card)">15 min NDA</td><td class="mx-na">—</td><td class="mx-na">—</td><td class="mx-req" style="font-size:9px">If no Dest Alt + no sgl rwy hold</td><td class="mx-na">—</td><td class="mx-na">—</td><td class="mx-na">—</td></tr>
        <tr><td style="font-weight:700;text-align:left;background:var(--card)">Req / Pln Add</td><td class="mx-opt">If req</td><td class="mx-opt">If req</td><td class="mx-na">—</td><td class="mx-na">—</td><td class="mx-na">—</td><td class="mx-na">—</td></tr>
      </tbody>
    </table>
    </div>
    <div class="fc-note" style="margin-top:8px">* If Dest &lt; Landing Minima at DPA: Dest Alternate must be ≥ Determining Minima (or RDM). Green = always required. Amber = required if applicable. Grey = not applicable.</div>`},

  { key:'fc-divert', title:'🔀 Flowchart — Inflight Diversions', body:`
    <div class="fc">
      <div class="fc-start">INFLIGHT DIVERSIONS — NORMAL OPERATIONS</div>
      <div class="fc-arrow">↓</div>
      <div class="fc-q">Reason for diversion?</div>
      <div class="fc-split" style="margin-top:6px">

        <div class="fc-col">
          <div class="fc-tag n" style="font-size:9px;background:#f3e8ff;color:#7e22ce">General Enroute<br>(not DPA-related)</div>
          <div class="fc-arrow">↓</div>
          <div class="fc-box p">
            <div class="fc-box-title">Apply FAM 16.10.1</div>
            General Inflight Requirements from diversion point to new Destination.<br>
            <div style="margin-top:4px;font-size:10px">Divert to any Cat A or B Airport.</div>
          </div>
        </div>

        <div class="fc-col">
          <div class="fc-tag bm" style="font-size:9px">DPA Requirements<br>not expected to be met</div>
          <div class="fc-arrow">↓</div>
          <div class="fc-box a">
            <div class="fc-box-title">Apply FAM 16.10.4.1</div>
            Fly-on requirements from diversion point to proceed to DPA Airport.<br>
            <div style="margin-top:4px;font-size:10px">Divert to DPA Airport (any Cat A or B).</div>
          </div>
        </div>

        <div class="fc-col">
          <div class="fc-tag y" style="font-size:9px;background:#dcfce7">After DPA<br>passed compliantly</div>
          <div class="fc-arrow">↓</div>
          <div class="fc-box g">
            <div class="fc-box-title">DPA Requirements Released</div>
            Dest Alt Fuel, Contingency, Holding and DM/RDM/QM no longer protected.<br>
            <div style="margin-top:4px;font-size:10px">Manage flight to land safely above <b>LM</b> with <b>FRF</b> intact — at Destination, Dest Alt, or any Cat A or B airport.</div>
          </div>
        </div>

      </div>
      <div style="margin-top:10px;background:#fee2e2;border:1px solid #fca5a5;border-radius:8px;padding:8px 10px;font-size:11px;font-weight:700;text-align:center;color:#991b1b">
        ⛔ Non-Normal Operations → Follow QRH / FCTM / FCOM and FAM 22.3 — Use Landing Minima
      </div>
    </div>`},
];

function refToggle(key) { S.ref.expanded = S.ref.expanded === key ? null : key; render(); }

function renderRef() {
  return `
    <div class="disclaimer">📚 <b>Reference material only — not for operational use.</b> The Operations Manual (FAM) and EFF+ take precedence over all guidance material.</div>
    ${REF_SECTIONS.map(s => `
      <div class="card" style="padding:0;margin-bottom:8px">
        <button class="acc-btn" onclick="refToggle('${s.key}')">
          <span>${s.title}</span>
          <span class="acc-chevron ${S.ref.expanded === s.key ? 'open' : ''}">⌄</span>
        </button>
        ${S.ref.expanded === s.key ? `<div class="acc-body fade-up">${s.body}</div>` : ''}
      </div>`).join('')}`;
}

// ══════════════════════════════════════════════════════
// INIT
// ══════════════════════════════════════════════════════
render();
</script>

<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js')
      .then(() => console.log('SW registered'))
      .catch(e => console.log('SW error:', e));
  });
}
</script>
</body>
