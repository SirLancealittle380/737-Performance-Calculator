<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="mobile-web-app-capable" content="yes">
  <title>737 Fuel &amp; Alternate Policy</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#CC0000">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    :root {
      --red: #CC0000;
      --dark-red: #990000;
      --green: #166534;
      --green-bg: #dcfce7;
      --amber: #92400e;
      --amber-bg: #fef3c7;
      --blue: #1e40af;
      --blue-bg: #dbeafe;
      --red-bg: #fee2e2;
      --bg: #f1f5f9;
      --card: #ffffff;
      --border: #e2e8f0;
      --text: #0f172a;
      --text-muted: #64748b;
      --nav-h: 62px;
      --header-h: 58px;
    }

    html, body { height: 100%; overflow: hidden; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    #app { display: flex; flex-direction: column; height: 100vh; }

    /* ─── HEADER ─── */
    .header {
      background: var(--red);
      color: white;
      height: var(--header-h);
      display: flex;
      align-items: center;
      padding: 0 16px;
      gap: 12px;
      flex-shrink: 0;
      box-shadow: 0 2px 8px rgba(0,0,0,0.25);
      position: relative;
      z-index: 10;
    }
    .header-logo {
      width: 38px; height: 38px; border-radius: 50%;
      background: white; display: flex; align-items: center; justify-content: center;
      font-size: 20px; font-weight: 900; color: var(--red); flex-shrink: 0;
      font-family: Georgia, 'Times New Roman', serif; letter-spacing: -1px;
    }
    .header-title { font-size: 17px; font-weight: 700; line-height: 1.2; }
    .header-sub { font-size: 11px; opacity: 0.8; margin-top: 2px; }

    /* ─── SCROLL AREA ─── */
    .scroll-area {
      flex: 1;
      overflow-y: auto;
      padding: 14px 14px calc(var(--nav-h) + 14px);
      -webkit-overflow-scrolling: touch;
    }
    .scroll-area::-webkit-scrollbar { display: none; }

    /* ─── BOTTOM NAV ─── */
    .bottom-nav {
      position: fixed; bottom: 0; left: 0; right: 0;
      height: var(--nav-h);
      background: white;
      border-top: 1px solid var(--border);
      display: flex;
      z-index: 100;
      box-shadow: 0 -2px 8px rgba(0,0,0,0.06);
    }
    .nav-btn {
      flex: 1; background: none; border: none; cursor: pointer;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 3px; font-size: 10px; font-weight: 600; color: var(--text-muted);
      padding: 6px 4px; transition: color 0.15s;
    }
    .nav-btn.active { color: var(--red); }
    .nav-btn .nav-icon { font-size: 22px; line-height: 1; }

    /* ─── CARDS ─── */
    .card {
      background: var(--card);
      border-radius: 14px;
      padding: 16px;
      margin-bottom: 12px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    }
    .card-label {
      font-size: 11px; font-weight: 700; letter-spacing: 0.8px;
      color: var(--red); text-transform: uppercase; margin-bottom: 12px;
    }

    /* ─── WIZARD ─── */
    .phase-badge {
      display: inline-flex; align-items: center; gap: 5px;
      background: #fff1f2; color: var(--red);
      border-radius: 20px; padding: 3px 10px;
      font-size: 11px; font-weight: 700; letter-spacing: 0.3px;
      margin-bottom: 14px;
    }
    .wiz-question { font-size: 16px; font-weight: 700; line-height: 1.4; margin-bottom: 6px; }
    .wiz-hint { font-size: 13px; color: var(--text-muted); line-height: 1.5; margin-bottom: 16px; }
    .wiz-options { display: flex; flex-direction: column; gap: 9px; }
    .opt-btn {
      padding: 13px 14px; border: 2px solid var(--border);
      border-radius: 12px; background: white; cursor: pointer;
      text-align: left; transition: border-color 0.15s, background 0.15s;
    }
    .opt-btn:active { background: #f8fafc; }
    .opt-btn.chosen { border-color: var(--red); background: #fff5f5; }
    .opt-main { font-size: 14px; font-weight: 600; margin-bottom: 3px; }
    .opt-desc { font-size: 12px; color: var(--text-muted); line-height: 1.4; }

    /* ─── RESULTS ─── */
    .result-box {
      border-radius: 12px; padding: 15px; margin-bottom: 12px;
      border-left: 5px solid;
    }
    .result-box.green { background: var(--green-bg); border-color: var(--green); }
    .result-box.amber { background: var(--amber-bg); border-color: #d97706; }
    .result-box.red   { background: var(--red-bg);   border-color: #dc2626; }
    .result-box.blue  { background: var(--blue-bg);  border-color: var(--blue); }
    .result-action { font-size: 26px; font-weight: 900; letter-spacing: -0.5px; margin-bottom: 4px; }
    .result-title { font-size: 15px; font-weight: 700; margin-bottom: 6px; }
    .result-body  { font-size: 13px; line-height: 1.6; color: #374151; }

    /* ─── REQUIREMENT LIST ─── */
    .req-list { margin-top: 14px; }
    .req-list-title { font-size: 13px; font-weight: 700; color: var(--text-muted); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.4px; }
    .req-item { display: flex; gap: 10px; padding: 9px 0; border-bottom: 1px solid #f1f5f9; font-size: 13px; line-height: 1.5; }
    .req-item:last-child { border-bottom: none; }
    .req-icon { flex-shrink: 0; font-size: 16px; margin-top: 1px; }

    /* ─── INFO BOX ─── */
    .info-box {
      background: #f0f9ff; border: 1px solid #bae6fd;
      border-radius: 10px; padding: 11px 13px;
      font-size: 12px; color: #075985; line-height: 1.5; margin-top: 12px;
    }

    /* ─── BUTTONS ─── */
    .btn { padding: 13px 20px; border-radius: 12px; border: none; cursor: pointer; font-size: 14px; font-weight: 600; width: 100%; margin-top: 10px; transition: opacity 0.15s; }
    .btn:active { opacity: 0.75; }
    .btn-primary { background: var(--red); color: white; }
    .btn-ghost { background: #f1f5f9; color: var(--text); }

    /* ─── FUEL CALCULATOR ─── */
    .field-group { margin-bottom: 14px; }
    .field-label { font-size: 11px; font-weight: 700; letter-spacing: 0.6px; color: var(--text-muted); text-transform: uppercase; margin-bottom: 7px; display: block; }
    .field-row { display: flex; align-items: center; gap: 8px; }
    .field-input {
      flex: 1; padding: 12px 14px; border: 2px solid var(--border);
      border-radius: 10px; font-size: 16px; background: white;
      color: var(--text); outline: none; transition: border-color 0.15s;
      -webkit-appearance: none;
    }
    .field-input:focus { border-color: var(--red); }
    .field-unit { font-size: 13px; color: var(--text-muted); white-space: nowrap; }
    .field-hint { font-size: 11px; color: #94a3b8; margin-top: 5px; }

    .toggle-row { display: flex; gap: 7px; flex-wrap: wrap; }
    .tog-btn {
      padding: 9px 14px; border: 2px solid var(--border); border-radius: 9px;
      background: white; cursor: pointer; font-size: 13px; font-weight: 600;
      color: var(--text-muted); transition: border-color 0.15s, background 0.15s, color 0.15s;
    }
    .tog-btn.on { border-color: var(--red); background: #fff5f5; color: var(--red); }

    /* ─── FUEL BREAKDOWN ─── */
    .fuel-row { display: flex; justify-content: space-between; align-items: flex-start; padding: 10px 0; border-bottom: 1px solid #f1f5f9; }
    .fuel-row:last-child { border-bottom: none; border-top: 2px solid #e2e8f0; margin-top: 6px; padding-top: 14px; }
    .fuel-name { font-size: 14px; flex: 1; }
    .fuel-note { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
    .fuel-amt { font-size: 14px; font-weight: 700; color: var(--red); text-align: right; white-space: nowrap; }
    .fuel-amt.nil { color: #94a3b8; font-weight: 500; }
    .fuel-row:last-child .fuel-name { font-weight: 700; font-size: 15px; }
    .fuel-row:last-child .fuel-amt { font-size: 18px; }

    /* ─── REFERENCE ACCORDION ─── */
    .acc-btn {
      width: 100%; padding: 15px 16px; background: none; border: none;
      cursor: pointer; display: flex; justify-content: space-between; align-items: center;
      font-size: 14px; font-weight: 600; color: var(--text); text-align: left;
    }
    .acc-chevron { font-size: 18px; color: var(--text-muted); flex-shrink: 0; transition: transform 0.2s; }
    .acc-chevron.open { transform: rotate(180deg); }
    .acc-body { padding: 0 16px 15px; border-top: 1px solid var(--border); }

    .ref-item { margin-bottom: 13px; }
    .ref-term { font-size: 13px; font-weight: 700; margin-bottom: 3px; display: flex; align-items: center; gap: 7px; flex-wrap: wrap; }
    .ref-badge { display: inline-block; background: var(--red); color: white; font-size: 11px; font-weight: 700; padding: 1px 7px; border-radius: 4px; }
    .ref-def { font-size: 12px; color: var(--text-muted); line-height: 1.55; }

    .minima-table { width: 100%; border-collapse: collapse; font-size: 12px; margin-top: 6px; }
    .minima-table th { padding: 7px 9px; background: #f8fafc; border: 1px solid var(--border); font-size: 11px; font-weight: 700; color: var(--text-muted); text-align: left; }
    .minima-table td { padding: 8px 9px; border: 1px solid var(--border); vertical-align: top; line-height: 1.45; }
    .td-dm  { background: #dbeafe; font-weight: 700; }
    .td-rdm { background: #dcfce7; font-weight: 700; }
    .td-qm  { background: #fef9c3; font-weight: 700; }
    .td-lm  { background: #f8fafc; font-weight: 700; }

    /* ─── ANIMATION ─── */
    @keyframes fadeUp { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
    .fade-up { animation: fadeUp 0.2s ease-out; }

    /* ─── DISCLAIMER ─── */
    .disclaimer {
      border-radius: 10px; padding: 10px 13px; margin-bottom: 10px;
      background: #fff7ed; border: 1px solid #fed7aa;
      font-size: 12px; color: #9a3412; line-height: 1.5;
    }

    /* ─── DARK MODE ─── */
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #0f172a; --card: #1e293b; --border: #334155;
        --text: #f1f5f9; --text-muted: #94a3b8;
      }
      .opt-btn { background: var(--card); }
      .opt-btn.chosen { background: #3b0606; }
      .bottom-nav { background: #1e293b; }
      .tog-btn { background: var(--card); }
      .tog-btn.on { background: #3b0606; }
      .field-input { background: var(--card); color: var(--text); }
      .btn-ghost { background: #334155; }
      .minima-table th { background: #334155; }
      .minima-table td { background: var(--card); }
      .acc-btn { color: var(--text); }
      .phase-badge { background: #3b0606; }
      .disclaimer { background: #431407; border-color: #7c2d12; color: #fed7aa; }
      .info-box { background: #0c2a3d; border-color: #164e63; color: #7dd3fc; }
    }
  </style>
</head>
<body>
<div id="app">
  <header class="header">
    <div class="header-logo">Q</div>
    <div>
      <div class="header-title">737 Fuel &amp; Alternate Policy</div>
      <div class="header-sub">Personal Study Tool — FAM Ch.16 · v1.2 Mar 2026</div>
    </div>
  </header>

  <div class="scroll-area" id="content">
    <!-- rendered by JS -->
  </div>

  <nav class="bottom-nav">
    <button class="nav-btn active" data-tab="preflight" onclick="switchTab('preflight')">
      <span class="nav-icon">📋</span><span>Preflight</span>
    </button>
    <button class="nav-btn" data-tab="dpa" onclick="switchTab('dpa')">
      <span class="nav-icon">✈️</span><span>At DPA</span>
    </button>
    <button class="nav-btn" data-tab="fuel" onclick="switchTab('fuel')">
      <span class="nav-icon">⛽</span><span>Fuel Calc</span>
    </button>
    <button class="nav-btn" data-tab="ref" onclick="switchTab('ref')">
      <span class="nav-icon">📚</span><span>Reference</span>
    </button>
  </nav>
</div>

<script>
// ══════════════════════════════════════════════
// STATE
// ══════════════════════════════════════════════
const S = {
  tab: 'preflight',

  // Preflight wizard
  pf: { step: 0, answers: {} },

  // DPA wizard
  dpa: { step: 0, answers: {} },

  // Fuel calculator
  fuel: {
    frf: '', destType: null, altCarried: null,
    altFuel: '', tripFuel: '', contingency: '5'
  },

  // Reference
  ref: { expanded: null }
};

// ══════════════════════════════════════════════
// ROUTER
// ══════════════════════════════════════════════
function switchTab(tab) {
  S.tab = tab;
  document.querySelectorAll('.nav-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.tab === tab);
  });
  render();
}

function render() {
  const el = document.getElementById('content');
  let html = '';
  switch (S.tab) {
    case 'preflight': html = renderPreflight(); break;
    case 'dpa':       html = renderDPA();       break;
    case 'fuel':      html = renderFuel();      break;
    case 'ref':       html = renderRef();       break;
  }
  el.innerHTML = `<div class="fade-up">${html}</div>`;
}

// ══════════════════════════════════════════════
// PREFLIGHT TAB
// ══════════════════════════════════════════════
const PF_STEPS = [
  {
    key: 'destWeather',
    phase: 'Destination Assessment',
    q: 'What is the destination forecast at ETOU?',
    hint: 'ETOU = ETA ± 30 minutes. Check the TAF for this window at destination.',
    opts: [
      { v: 'above-dm', label: '✅ At or above Determining Minima (DM)', desc: 'Forecast ceiling/vis meets or exceeds DM throughout the ETOU window' },
      { v: 'below-dm', label: '⚠️ Below Determining Minima (DM)', desc: 'Forecast ceiling/vis is below DM for some or all of the ETOU window' },
    ]
  },
  {
    key: 'altAvail',
    phase: 'Alternate Assessment',
    when: a => a.destWeather === 'below-dm',
    q: 'Is a suitable Destination Alternate available at or above Qualifying Minima (QM)?',
    hint: 'Check the CMSG EFF+ top note or Airport Planning Minima document for QM at candidate alternates.',
    opts: [
      { v: 'yes', label: '✅ Yes – suitable alternate available (≥ QM)', desc: 'A Destination Alternate meeting QM is available and within range' },
      { v: 'no',  label: '❌ No – no suitable alternate available',       desc: 'No airport meets QM, or all suitable alternates are out of range' },
    ]
  },
  {
    key: 'destType',
    phase: 'Destination Type',
    when: a => a.destWeather === 'above-dm' || a.altAvail === 'yes',
    q: 'What is the destination type?',
    hint: 'This determines whether 25 min single-runway holding fuel applies at DPA.',
    opts: [
      { v: 'domestic',     label: '🇦🇺 Domestic (Australian territory)',         desc: 'Within Australian territory – no 25 min single-runway holding requirement' },
      { v: 'multi-intl',   label: '🌏 International – multiple suitable runways', desc: 'Outside Australia with 2+ separate suitable runways available' },
      { v: 'single-intl',  label: '⚠️ International – single suitable runway',   desc: 'Outside Australia with only one suitable runway – 25 min holding fuel required at DPA' },
    ]
  },
];

function pfActiveSteps() {
  return PF_STEPS.filter(s => !s.when || s.when(S.pf.answers));
}

function pfAnswer(key, val) {
  S.pf.answers[key] = val;
  // Clear dependent answers
  if (key === 'destWeather') { delete S.pf.answers.altAvail; delete S.pf.answers.destType; }
  if (key === 'altAvail') { delete S.pf.answers.destType; }
  S.pf.step++;
  render();
}

function pfReset() { S.pf = { step: 0, answers: {} }; render(); }

function pfResult() {
  const { destWeather, altAvail, destType } = S.pf.answers;
  if (destWeather === 'above-dm') {
    const hold = destType === 'single-intl'
      ? `<div class="info-box">⚠️ <b>Single-runway international:</b> 25 min holding fuel also required at DPA — verify OFP Destination EOD ≥ 80 min. Calculated as FRF × 5/6.</div>`
      : `<div class="info-box">✅ <b>${destType === 'domestic' ? 'Domestic' : 'Multi-runway international'}:</b> Only 15 min NDA fuel required at DPA (= FRF × 0.5). No 25 min holding needed.</div>`;
    return `
      <div class="result-box green">
        <div class="result-title">✅ No Destination Alternate Required</div>
        <div class="result-body">Destination forecast is at or above Determining Minima at ETOU.</div>
      </div>
      <div class="req-list">
        <div class="req-list-title">Planning Requirements</div>
        <div class="req-item"><span class="req-icon">✈️</span>DPA Airport must be ≥ DM, within 90 min of destination</div>
        <div class="req-item"><span class="req-icon">⛽</span>15 min NDA fuel required at DPA (FRF × 0.5)</div>
        <div class="req-item"><span class="req-icon">⏱️</span>ETOU = ETA ± 30 min (or ETA −30/+60 for isolated destinations)</div>
        <div class="req-item"><span class="req-icon">📋</span>No Destination Alternate Fuel required on OFP</div>
      </div>
      ${hold}`;
  }
  if (destWeather === 'below-dm' && altAvail === 'yes') {
    const hold = destType === 'single-intl'
      ? `<div class="info-box">💡 Carrying an alternate removes both the 15 min NDA and 25 min single-runway holding requirements at DPA.</div>`
      : `<div class="info-box">💡 Carrying an alternate removes the 15 min NDA fuel requirement at DPA.</div>`;
    return `
      <div class="result-box amber">
        <div class="result-title">⚠️ Destination Alternate Required</div>
        <div class="result-body">Destination is below DM. A Destination Alternate must be carried.</div>
      </div>
      <div class="req-list">
        <div class="req-list-title">Planning Requirements</div>
        <div class="req-item"><span class="req-icon">🛫</span>Destination Alternate must be ≥ Qualifying Minima (QM)</div>
        <div class="req-item"><span class="req-icon">✈️</span>DPA Airport must be ≥ DM, within 90 min of destination</div>
        <div class="req-item"><span class="req-icon">⛽</span>Destination Alternate Fuel required on OFP</div>
        <div class="req-item"><span class="req-icon">⛽</span>NDA 15 min fuel NOT required when alternate is carried</div>
      </div>
      ${hold}`;
  }
  if (destWeather === 'below-dm' && altAvail === 'no') {
    return `
      <div class="result-box red">
        <div class="result-title">🔴 Payload Limited — 2× DPA Airports Required</div>
        <div class="result-body">No suitable alternate. Two DPA Airports (each ≥ DM) must be planned to defer the alternate decision to DPA inflight.</div>
      </div>
      <div class="req-list">
        <div class="req-list-title">Planning Requirements</div>
        <div class="req-item"><span class="req-icon">✈️</span>DPA Airport 1 ≥ DM — acts as commercial planning destination</div>
        <div class="req-item"><span class="req-icon">✈️</span>DPA Airport 2 ≥ DM — acts as the DPA Airport</div>
        <div class="req-item"><span class="req-icon">⚠️</span>Controlling DPA = the DPA point furthest from destination</div>
        <div class="req-item"><span class="req-icon">⛽</span>No Destination Alternate Fuel loaded — flight is payload limited</div>
        <div class="req-item"><span class="req-icon">📋</span>At DPA, normal fly-on/divert criteria apply based on current conditions</div>
      </div>
      <div class="info-box">⚠️ This operation relies on weather at destination improving to ≥ DM or RDM by the time DPA is reached. The flight may only pass DPA if Inflight Fuel Requirements are met.</div>`;
  }
  return '';
}

function renderPreflight() {
  const steps = pfActiveSteps();
  const isComplete = S.pf.step >= steps.length;
  const current = steps[S.pf.step];

  if (isComplete) {
    return `
      <div class="card">${pfResult()}
        <button class="btn btn-ghost" onclick="pfReset()">🔄 Start Over</button>
      </div>
      <div class="card" style="font-size:13px;color:var(--text-muted);line-height:1.55">
        <div class="card-label">ℹ️ About ETOU</div>
        Estimated Time of Use = ETA ± 30 min. Airport weather is assessed for Relevant Weather Conditions (eg INTER, TEMPO) during this window. Runway/navaid availability is assessed at ETA. Isolated destinations use a wider window: ETA −30/+60 min.
      </div>`;
  }

  const stepDots = steps.map((_, i) => {
    let cls = i < S.pf.step ? 'done' : i === S.pf.step ? 'active' : '';
    return `<span style="display:inline-block;width:${cls==='active'?'22px':'8px'};height:8px;border-radius:4px;background:${cls==='done'?'var(--green)':cls==='active'?'var(--red)':'var(--border)'};margin-right:5px;transition:all 0.2s"></span>`;
  }).join('');

  const opts = current.opts.map(o =>
    `<button class="opt-btn" onclick="pfAnswer('${current.key}','${o.v}')">
       <div class="opt-main">${o.label}</div>
       <div class="opt-desc">${o.desc}</div>
     </button>`
  ).join('');

  return `
    <div class="card">
      <div style="margin-bottom:14px">${stepDots}</div>
      <div class="phase-badge">📋 ${current.phase}</div>
      <div class="wiz-question">${current.q}</div>
      <div class="wiz-hint">${current.hint}</div>
      <div class="wiz-options">${opts}</div>
    </div>
    <div class="card" style="font-size:13px;color:var(--text-muted);line-height:1.55">
      <div class="card-label">🛫 Preflight Goal</div>
      Preflight, the policy maintains <b>two</b> safe landing options up to DPA — either (1) Destination + DPA Airport, or (2) DPA Airport + Destination Alternate.
    </div>`;
}

// ══════════════════════════════════════════════
// DPA TAB
// ══════════════════════════════════════════════
const DPA_STEPS = [
  {
    key: 'destVsMin',
    phase: 'Destination Weather at DPA',
    q: 'Current destination weather vs planning minima?',
    hint: 'Based on the current TAF/ATIS. At DPA, Reduced Determining Minima (RDM) may be available if conditions are met.',
    opts: [
      { v: 'above-dm',  label: '✅ At or above Determining Minima (DM)',          desc: 'Standard fly-on criteria met' },
      { v: 'above-rdm', label: '🟡 At or above Reduced Determining Minima (RDM)', desc: 'Below DM but meets RDM — TAF3 or High Frequency TAF may be needed' },
      { v: 'above-lm',  label: '🟠 Below DM/RDM but at or above Landing Minima',  desc: 'Approach possible; Destination Alternate ≥ QM required to continue' },
      { v: 'below-lm',  label: '🔴 Below Landing Minima',                          desc: 'Below LM; Destination Alternate ≥ DM/RDM required if continuing' },
    ]
  },
  {
    key: 'taf3',
    phase: 'RDM Criteria',
    when: a => a.destVsMin === 'above-rdm',
    q: 'Is a current TAF3, ICAO Landing Forecast, or High Frequency TAF available?',
    hint: 'High Frequency TAF = TAF issued every 3 hours at major aerodromes in USA, NZ and Canada. Required for RDM application.',
    opts: [
      { v: 'yes', label: '✅ Yes – current TAF3 or HF-TAF available', desc: 'RDM may be applied' },
      { v: 'no',  label: '❌ No – not available',                       desc: 'RDM cannot be applied; treat as standard DM assessment' },
    ]
  },
  {
    key: 'destAlt',
    phase: 'Destination Alternate',
    when: a => a.destVsMin === 'above-lm' || a.destVsMin === 'below-lm',
    q: a => a.destVsMin === 'below-lm'
      ? 'Is the Destination Alternate suitable at or above DM or RDM?'
      : 'Is the Destination Alternate still suitable at or above Qualifying Minima (QM)?',
    hint: a => a.destVsMin === 'below-lm'
      ? 'When destination is below Landing Minima, the alternate must meet DM or RDM — not just QM. It acts as the planning destination.'
      : 'Destination Alternate must meet Qualifying Minima (QM).',
    opts: [
      { v: 'yes', label: '✅ Yes – Destination Alternate suitable', desc: 'Alternate meets required minima' },
      { v: 'no',  label: '❌ No – Destination Alternate not suitable', desc: 'Below required minima or unavailable' },
    ]
  },
  {
    key: 'dpaOk',
    phase: 'DPA Airport Check',
    q: 'Is the DPA Airport currently at or above Determining Minima?',
    hint: 'The DPA Airport must be ≥ DM for the flight to pass DPA compliantly. Check current TAF/ATIS.',
    opts: [
      { v: 'yes', label: '✅ Yes – DPA Airport ≥ DM', desc: 'DPA Airport is suitable' },
      { v: 'no',  label: '❌ No – DPA Airport below DM', desc: 'DPA requirements cannot be met with this airport' },
    ]
  },
];

function dpaActiveSteps() {
  return DPA_STEPS.filter(s => {
    if (!s.when) return true;
    const w = typeof s.when === 'function' ? s.when(S.dpa.answers) : s.when;
    return w;
  });
}

function dpaAnswer(key, val) {
  S.dpa.answers[key] = val;
  if (key === 'destVsMin') { delete S.dpa.answers.taf3; delete S.dpa.answers.destAlt; delete S.dpa.answers.dpaOk; }
  S.dpa.step++;
  render();
}

function dpaReset() { S.dpa = { step: 0, answers: {} }; render(); }

function dpaResult() {
  const { destVsMin, taf3, destAlt, dpaOk } = S.dpa.answers;

  if (dpaOk === 'no') return `
    <div class="result-box red">
      <div class="result-action">DIVERT</div>
      <div class="result-title">🔴 DPA Airport Not Suitable</div>
      <div class="result-body">The DPA Airport is below Determining Minima. DPA requirements cannot be met. Divert to the DPA Airport or another suitable Cat A/B airport.</div>
    </div>
    <div class="info-box">If a replacement DPA Airport cannot be found and the Destination and remaining DPA Airport do not meet relinquishment criteria, the PIC should take the safest course of action (FAM 16.10.4.3).</div>`;

  if (destVsMin === 'above-dm' && dpaOk === 'yes') return `
    <div class="result-box green">
      <div class="result-action">FLY ON</div>
      <div class="result-title">✅ All DPA Requirements Met</div>
      <div class="result-body">Destination ≥ DM. DPA Airport suitable. No Destination Alternate required. Flight may proceed.</div>
    </div>
    <div class="req-list">
      <div class="req-list-title">Post-DPA Considerations</div>
      <div class="req-item"><span class="req-icon">⛽</span>15 min NDA fuel must be on board at DPA (FRF × 0.5); may be used/repurposed immediately after DPA</div>
      <div class="req-item"><span class="req-icon">🛡️</span>FRF must remain protected throughout</div>
      <div class="req-item"><span class="req-icon">📋</span>DPA alternate/fuel requirements now released — only FRF applies</div>
    </div>`;

  if (destVsMin === 'above-rdm' && taf3 === 'yes' && dpaOk === 'yes') return `
    <div class="result-box green">
      <div class="result-action">FLY ON</div>
      <div class="result-title">✅ RDM Applicable — Requirements Met</div>
      <div class="result-body">Destination ≥ RDM with current TAF3/HF-TAF. DPA Airport suitable. Flight may proceed.</div>
    </div>
    <div class="req-list">
      <div class="req-list-title">Post-DPA Considerations</div>
      <div class="req-item"><span class="req-icon">📄</span>Confirm TAF3 or HF-TAF is current at time of DPA</div>
      <div class="req-item"><span class="req-icon">⛽</span>15 min NDA fuel must be on board at DPA</div>
      <div class="req-item"><span class="req-icon">🛡️</span>FRF must remain protected throughout</div>
    </div>
    <div class="info-box">💡 RDM is only available inflight at DPA. It cannot be applied preflight. Canada adds a 100ft/400m buffer to RDM values.</div>`;

  if (destVsMin === 'above-rdm' && taf3 === 'no') return `
    <div class="result-box amber">
      <div class="result-action">REASSESS</div>
      <div class="result-title">⚠️ RDM Not Available — Treat as Standard DM</div>
      <div class="result-body">TAF3/HF-TAF not available. RDM cannot be applied. Reassess destination against standard Determining Minima. If destination is below DM, a Destination Alternate is required to continue.</div>
    </div>`;

  if ((destVsMin === 'above-lm' || destVsMin === 'below-lm') && destAlt === 'yes' && dpaOk === 'yes') {
    const isAboveLM = destVsMin === 'above-lm';
    return `
      <div class="result-box amber">
        <div class="result-action">FLY ON</div>
        <div class="result-title">⚠️ Continue — Alternate Required</div>
        <div class="result-body">${isAboveLM
          ? 'Destination is below DM/RDM but at/above LM. Destination Alternate ≥ QM allows continuation. An approach may be attempted.'
          : 'Destination is below Landing Minima. Destination Alternate ≥ DM/RDM acts as the planning destination. An approach may be attempted; expect divert.'}</div>
      </div>
      <div class="req-list">
        <div class="req-list-title">Post-DPA Considerations</div>
        ${isAboveLM
          ? '<div class="req-item"><span class="req-icon">🛫</span>Destination Alternate ≥ QM — fuel remains protected</div>'
          : '<div class="req-item"><span class="req-icon">🛫</span>Destination Alternate ≥ DM/RDM — fuel remains protected (acting as planning destination)</div>'}
        <div class="req-item"><span class="req-icon">🔄</span>If missed approach, proceed to Destination Alternate</div>
        <div class="req-item"><span class="req-icon">🛡️</span>FRF must remain protected throughout</div>
        <div class="req-item"><span class="req-icon">📋</span>After DPA, Landing Minima is used for all assessments</div>
      </div>`;
  }

  if ((destVsMin === 'above-lm' || destVsMin === 'below-lm') && destAlt === 'no') return `
    <div class="result-box red">
      <div class="result-action">DIVERT</div>
      <div class="result-title">🔴 No Suitable Alternate — Cannot Fly On</div>
      <div class="result-body">Destination is below DM/RDM and no suitable Destination Alternate is available. DPA fly-on requirements cannot be met. Divert to DPA Airport or another Category A/B airport.</div>
    </div>`;

  return `<div class="result-box amber"><div class="result-title">⚠️ Assessment Incomplete</div><div class="result-body">Review options with Dispatch.</div></div>`;
}

function renderDPA() {
  const steps = dpaActiveSteps();
  const isComplete = S.dpa.step >= steps.length;
  const current = steps[S.dpa.step];

  if (isComplete) {
    return `
      <div class="card">${dpaResult()}
        <button class="btn btn-ghost" onclick="dpaReset()">🔄 New Assessment</button>
      </div>
      <div class="card" style="font-size:13px;color:var(--text-muted);line-height:1.55">
        <div class="card-label">📍 After DPA</div>
        Once past DPA in compliance with inflight requirements, only FRF needs to be protected. The PIC may continue towards destination and manage the remainder of the flight to land safely at or above Landing Minima with FRF intact.
      </div>`;
  }

  const q = typeof current.q === 'function' ? current.q(S.dpa.answers) : current.q;
  const hint = typeof current.hint === 'function' ? current.hint(S.dpa.answers) : current.hint;

  const stepDots = steps.map((_, i) => {
    let cls = i < S.dpa.step ? 'done' : i === S.dpa.step ? 'active' : '';
    return `<span style="display:inline-block;width:${cls==='active'?'22px':'8px'};height:8px;border-radius:4px;background:${cls==='done'?'var(--green)':cls==='active'?'var(--red)':'var(--border)'};margin-right:5px;transition:all 0.2s"></span>`;
  }).join('');

  const opts = current.opts.map(o =>
    `<button class="opt-btn" onclick="dpaAnswer('${current.key}','${o.v}')">
       <div class="opt-main">${o.label}</div>
       <div class="opt-desc">${o.desc}</div>
     </button>`
  ).join('');

  return `
    <div class="card">
      <div style="margin-bottom:14px">${stepDots}</div>
      <div class="phase-badge">🔍 ${current.phase}</div>
      <div class="wiz-question">${q}</div>
      <div class="wiz-hint">${hint}</div>
      <div class="wiz-options">${opts}</div>
    </div>
    <div class="card" style="font-size:13px;color:var(--text-muted);line-height:1.55">
      <div class="card-label">✈️ At DPA Goal</div>
      At DPA, the policy transitions to <b>one</b> safe landing option. The fly-on/divert decision is made here based on current weather, fuel, and alternate status.
    </div>`;
}

// FUEL CALCULATOR TAB
// ══════════════════════════════════════════════
function fuelSet(key, val) {
  S.fuel[key] = val;
  render();
}

function renderFuel() {
  const f = S.fuel;
  const frf = parseFloat(f.frf) || 0;
  const altFuel = parseFloat(f.altFuel) || 0;
  const tripFuel = parseFloat(f.tripFuel) || 0;
  const contPct = Math.max(5, parseFloat(f.contingency) || 5);

  // Calculations
  const nda15 = Math.round(frf * 0.5);
  const hold25 = Math.round(frf * 25 / 30);
  const contFuel = Math.round(tripFuel * (contPct / 100));

  let breakdownHtml = '';
  let totalFuel = 0;

  if (frf > 0 && f.altCarried !== null && f.destType !== null) {
    if (f.altCarried === 'yes') {
      totalFuel = tripFuel + contFuel + altFuel + frf;
      breakdownHtml = `
        <div class="card-label">📊 Minimum Fuel at DPA</div>
        <div class="fuel-row"><div class="fuel-name">Trip Fuel (DPA → Dest)<div class="fuel-note">FMS figure — expected STAR + approach loaded</div></div><div class="fuel-amt">${fmt(tripFuel)} kg</div></div>
        <div class="fuel-row"><div class="fuel-name">Contingency (${contPct}%)<div class="fuel-note">Min 5% of trip fuel DPA→Dest</div></div><div class="fuel-amt">${fmt(contFuel)} kg</div></div>
        <div class="fuel-row"><div class="fuel-name">Destination Alternate Fuel<div class="fuel-note">From OFP</div></div><div class="fuel-amt">${fmt(altFuel)} kg</div></div>
        <div class="fuel-row"><div class="fuel-name">Final Reserve Fuel (FRF)<div class="fuel-note">30 min holding at 1500ft</div></div><div class="fuel-amt">${fmt(frf)} kg</div></div>
        <div class="fuel-row"><div class="fuel-name">NDA Fuel (15 min)<div class="fuel-note">✅ Not required — alternate carried</div></div><div class="fuel-amt nil">—</div></div>
        <div class="fuel-row"><div class="fuel-name">MINIMUM FUEL AT DPA</div><div class="fuel-amt">${fmt(Math.round(totalFuel))} kg</div></div>
        <div class="info-box">💡 Carrying a Destination Alternate removes the 15 min NDA and 25 min single-runway holding requirements.</div>`;
    } else {
      const usesHold = f.destType === 'single-intl';
      totalFuel = tripFuel + frf + nda15 + (usesHold ? hold25 : 0);
      breakdownHtml = `
        <div class="card-label">📊 Minimum Fuel at DPA</div>
        <div class="fuel-row"><div class="fuel-name">Trip Fuel (DPA → Dest)<div class="fuel-note">FMS figure — expected STAR + approach loaded</div></div><div class="fuel-amt">${fmt(tripFuel)} kg</div></div>
        <div class="fuel-row"><div class="fuel-name">Final Reserve Fuel (FRF)<div class="fuel-note">30 min holding at 1500ft</div></div><div class="fuel-amt">${fmt(frf)} kg</div></div>
        <div class="fuel-row"><div class="fuel-name">NDA Fuel (15 min)<div class="fuel-note">FRF × 0.5 — may be repurposed after DPA</div></div><div class="fuel-amt">${fmt(nda15)} kg</div></div>
        ${usesHold
          ? `<div class="fuel-row"><div class="fuel-name">25 min Single-Runway Holding<div class="fuel-note">FRF × 5/6 — verify OFP Dest EOD ≥ 80 min</div></div><div class="fuel-amt">${fmt(hold25)} kg</div></div>`
          : `<div class="fuel-row"><div class="fuel-name">25 min Holding Fuel<div class="fuel-note">✅ Not required — multi-runway or domestic</div></div><div class="fuel-amt nil">—</div></div>`}
        <div class="fuel-row"><div class="fuel-name">MINIMUM FUEL AT DPA</div><div class="fuel-amt">${fmt(Math.round(totalFuel))} kg</div></div>
        ${usesHold ? `<div class="info-box">⚠️ Verify OFP Destination EOD ≥ 80 min to confirm 25 min holding fuel is covered preflight.<br><br>💡 If a close-in Destination Alternate becomes available at DPA, carrying it removes both the NDA and holding requirements.</div>` : `<div class="info-box">💡 If a close-in Destination Alternate is available at DPA, carrying it removes the 15 min NDA fuel requirement.</div>`}`;
    }
  }

  const togDestType = (val, label) =>
    `<button class="tog-btn ${f.destType === val ? 'on' : ''}" onclick="fuelSet('destType','${val}')">${label}</button>`;
  const togAlt = (val, label) =>
    `<button class="tog-btn ${f.altCarried === val ? 'on' : ''}" onclick="fuelSet('altCarried','${val}')">${label}</button>`;

  return `
    <div class="card">
      <div class="card-label">⛽ Fuel at DPA Calculator</div>

      <div class="field-group">
        <label class="field-label">Final Reserve Fuel (FRF) — from OFP</label>
        <div class="field-row">
          <input class="field-input" type="number" inputmode="numeric" placeholder="e.g. 2100" value="${f.frf}" oninput="fuelSet('frf',this.value)">
          <span class="field-unit">kg</span>
        </div>
        <div class="field-hint">OFP shows FRF as 30 min holding at 1500ft above destination</div>
      </div>

      <div class="field-group">
        <label class="field-label">Destination Type</label>
        <div class="toggle-row">
          ${togDestType('domestic','🇦🇺 Domestic')}
          ${togDestType('multi-intl','🌏 Intl Multi-RWY')}
          ${togDestType('single-intl','⚠️ Intl Single-RWY')}
        </div>
      </div>

      <div class="field-group">
        <label class="field-label">Destination Alternate Carried?</label>
        <div class="toggle-row">
          ${togAlt('yes','✅ Yes')}
          ${togAlt('no','❌ No')}
        </div>
      </div>

      ${f.altCarried === 'yes' ? `
      <div class="field-group fade-up">
        <label class="field-label">Destination Alternate Fuel — from OFP</label>
        <div class="field-row">
          <input class="field-input" type="number" inputmode="numeric" placeholder="e.g. 3500" value="${f.altFuel}" oninput="fuelSet('altFuel',this.value)">
          <span class="field-unit">kg</span>
        </div>
      </div>` : ''}

      <div class="field-group">
        <label class="field-label">Trip Fuel DPA → Destination (FMS)</label>
        <div class="field-row">
          <input class="field-input" type="number" inputmode="numeric" placeholder="e.g. 4200" value="${f.tripFuel}" oninput="fuelSet('tripFuel',this.value)">
          <span class="field-unit">kg</span>
        </div>
        <div class="field-hint">Use FMS FUEL PRED with expected arrival procedure loaded</div>
      </div>

      ${f.altCarried === 'yes' ? `
      <div class="field-group fade-up">
        <label class="field-label">Contingency Fuel %</label>
        <div class="field-row">
          <input class="field-input" type="number" inputmode="numeric" placeholder="5" value="${f.contingency}" oninput="fuelSet('contingency',this.value)" style="max-width:90px">
          <span class="field-unit">% (minimum 5%)</span>
        </div>
      </div>` : ''}
    </div>

    ${breakdownHtml ? `<div class="card fade-up">${breakdownHtml}</div>` : ''}

    ${frf > 0 && frf < 1000 ? `<div class="disclaimer">⚠️ FRF value seems low. Confirm the OFP FRF value — for the B737-800 this is typically around 1,800–2,400 kg.</div>` : ''}`;
}

function fmt(n) { return n === 0 ? '0' : Math.round(n).toLocaleString(); }

      <div class="result-box blue" style="margin-bottom:10px">
        <div class="result-title">Phase 1B: Inflight to DPA</div>
        <div class="result-body">Maintain General Inflight Fuel Requirements. Ensure DPA Airport(s) remain suitable. Destination does not need to be protected — it is assessed at DPA.</div>
      </div>
      <div class="result-box green">
        <div class="result-title">Phase 2: DPA Onwards</div>
        <div class="result-body">Commit to <b>one</b> safe landing option. DPA fuel checks passed. Proceed to destination managing the remainder of the flight to land with FRF intact, at or above Landing Minima.</div>
      </div>`
  },
  {
    key: 'single-rwy',
    title: '🛬 Single-Runway International Airports',
    body: `
      <div class="ref-def" style="margin-bottom:10px">The 25 min holding fuel requirement applies at single-runway international destinations when no Destination Alternate is carried.</div>
      <div class="ref-item">
        <div class="ref-term">'Separate' vs 'Different' Runways</div>
        <div class="ref-def"><b>Different</b> = different runway numbers (eg Melbourne 16 and 34 are different). <b>Separate</b> = physically separate runways — if one closes end-to-end, the other's LDA remains usable. On the Qantas network, separate runways are always physically separate with no intersecting LDA (eg YSSY 16L/16R).</div>
      </div>
      <div class="ref-item">
        <div class="ref-term">Examples where 25 min holding applies (no alternate)</div>
        <div class="ref-def">Auckland (NZAA), Wellington (NZWN), Bali (WADD), Nadi (NFFN), Port Vila (NVVV), Apia (NSFA), Nuku'alofa (NFTF), Noumea (NWWW), Christchurch (NZCH)</div>
      </div>
      <div class="ref-item">
        <div class="ref-term">How to confirm OFP coverage</div>
        <div class="ref-def">Check OFP Destination EOD ≥ 80 min. This confirms FRF (30) + 25 min holding + 15 min NDA = 70 min are provided for preflight.</div>
      </div>`
  },
];

function refToggle(key) {
  S.ref.expanded = S.ref.expanded === key ? null : key;
  render();
}

function renderRef() {
  const sects = REF_SECTIONS.map(s => {
    const isOpen = S.ref.expanded === s.key;
    return `
      <div class="card" style="padding:0;margin-bottom:8px">
        <button class="acc-btn" onclick="refToggle('${s.key}')">
          <span>${s.title}</span>
          <span class="acc-chevron ${isOpen ? 'open' : ''}">⌄</span>
        </button>
        ${isOpen ? `<div class="acc-body fade-up">${s.body}</div>` : ''}
      </div>`;
  }).join('');

  return `
    <div class="disclaimer">
      📚 <b>Reference material only — not for operational use.</b><br>
      The Operations Manual (FAM) and EFF+ take precedence over any guidance material.
    </div>
    ${sects}`;
}

// ══════════════════════════════════════════════
// INIT
// ══════════════════════════════════════════════
render();
</script>
